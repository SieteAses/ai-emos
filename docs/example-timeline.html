isar\" de calidad (opcional, LLM-judge)\n\nLas señales mecánicas (errores, reintentos, sub-agente caro/lento, caché fría) se\ncalculan **siempre, sin LLM**. Para detectar problemas de **calidad** (respuestas\nflojas, razonamiento incompleto) hay un paso opcional, **backend-agnóstico**:\n\n- **`--judge harness` (recomendado, suscripción):** el script NO llama a ninguna\n  API. Corre el CLI con `--judge harness --json` para obtener `judgeCandidates`,\n  y **TÚ (este chat, con el modelo del usuario) evalúa cada candidato** — idealmente\n  lanzando sub-agentes en paralelo (uno por lote) que devuelvan, por candidato:\n  `{index, real, severity: alta|media|baja, why, recommendation}`. Cero key, cero\n  costo de API extra: usa la suscripción que ya corre esta skill.\n  Luego inyecta esos veredictos como findings de categoría `calidad` en el HTML\n  (añádelos al array `summary.findings` del JSON antes de escribir el template, o\n  pídele al usuario que prefiera el modo simple sin judge).\n- **`--judge local`** (modelo local, sin key, sin costo):\n  ```sh\n  node <skill-dir>/scripts/cli.mjs --session <id> \\\n    --judge local --judge-endpoint http://localhost:11434/v1 --judge-model qwen2.5 \\\n    --html ./session-timeline-<id>.html\n  ```\n- **`--judge api`** (solo si el usuario tiene key de pago):\n  `--judge api --judge-format anthropic --judge-model claude-haiku-4-5 --judge-key-env ANTHROPIC_API_KEY`\n  (o `--judge-format openai` con `--judge-endpoint`). Haiku 4.5 es el modelo\n  Anthropic más barato capaz para juzgar.\n\nSi el usuario no menciona calidad, NO actives el judge: el análisis mecánico ya es\nútil y es gratis.\n\n## Notas\n\n- **Honestidad de tokens:** la granularidad re…[recortado]"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/skills/visualize-session/SKILL.md (file state is current in your context — no need to Read it back)","isError":false},"raw":{"toolUseId":"toolu_01GvXhpkyTtd9B1Xs2f5ZCyx"},"kind":"tool_call","label":"tool: ulta al\n   usuario antes; edita `settings.json` con respaldo:\n   ```sh\n   node <skill-dir>/scripts/install-hooks.mjs --install --settings ~/.claude/settings.json\n   ```\n   Instala hooks `SessionStart`, `Stop` y `SubagentStop` que solo escriben un\n   marcador (no bloquean). Usa `--dry-run` para ver el diff sin aplicar.\n\n3. **(Opcional, \"ambos\") Anotar un agente/skill puntual.** Si el usuario quiere\n   etiquetas de fase más ricas que las que ya infiere el parser, añade a UN archivo\n   de agente/skill una instrucción ligera para que emita una etiqueta de fase\n   legible. Hazlo **archivo por archivo, consultando al usuario** — nunca masivo, y\n   nunca reescribas los 22 agentes de golpe.\n\n## 2. Agentes propios (mini-SDK NDJSON)\n\nPara cualquier agente JS/TS o Python que el usuario controle, instala el SDK y\nmuéstrale cómo emitir eventos. El adaptador `ndjson` los ingiere tal cual.\n\n- JS/TS: `sdk/emit.mjs` → `import { Tracer } from '<repo>/sdk/emit.mjs'`\n- Python: `sdk/emit.py` → `from emit import Tracer`\n\nEjemplo mínimo (ver cabecera de `sdk/emit.mjs` para la API completa):\n```js\nconst t = new Tracer('./traces/run.ndjson', { title:'mi corrida', source:'mi-agente' })\nt.message('user', '...'); const a = t.agent('worker'); a.tool('search', {input,output})\nt.decision('¿seguir?', { options:['sí','no'], chosen:['sí'] }); t.close()\n```\nLuego: `visualize-session --session ./traces/run.ndjson`.\n\n## 3. Sistemas con OpenTelemetry\n\nSi el sistema ya está (o puede estar) instrumentado con OTel-GenAI/OpenInference,\nno hace falta SDK propio. Sigue `<skill-dir>/scripts/setup-otel.md`: activa el\nexport a archivo OTLP-JSON y visualízalo con\n`visualize-session --adapter otel-genai --session ./spans.otlp.json`.\n\n## 4. Cursor / OpenAI-Codex\n\n- **Codex CLI:** ya escribe rollouts JSONL en `~/.codex/sessions/`. No instrumentes;\n  visualiza con `--adapter openai-codex`.\n- **Cursor:** guarda el chat en SQLite. Exporta el chat a JSON y visualiza con\n  `--adapter cursor --session ./chat.json`.\n\n## Regla de oro\n\nInstrumentar solo añade lo que la fuente no captura sola. Si dudas, primero\n`--check` / intenta visualizar; instrumenta únicamente si falta señal.\n"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/skills/instrument-source/SKILL.md (file state is current in your context — no need to Read it back)","isError":false},"raw":{"toolUseId":"toolu_01SqtNn481YxGyQYeuPjRZ48"},"kind":"tool_call","label":"tool:Write","index":86,"flags":[]},{"timestamp":"2026-06-28T22:43:22.234Z","role":"assistant","io":{"input":{"file_path":"/Users/sieteases/agent-visualizer/skills/instrument-source/scripts/install-hooks.mjs","content":"#!/usr/bin/env node\n/**\n * install-hooks.mjs — verifica la captura de Claude Code e instala hooks de\n * marcado OPCIONALES (no bloqueantes) para enriquecer el timeline.\n *\n *   node install-hooks.mjs --check\n *   node install-hooks.mjs --install [--settings <path>] [--dry-run]\n *\n * La captura principal (agentes/skills/tools/tokens/HITL) YA es automática en los\n * transcripts; estos hooks solo escriben marcadores de límite de sesión/sub-agente\n * a un sidecar (~/.claude/av-markers/) por si quieres límites de fase explícitos.\n */\n\nimport fs from 'fs'\nimport os from 'os'\nimport path from 'path'\n\nconst argv = process.argv.slice(2)\nconst has = f => argv.includes(f)\nconst flag = (n, d) => {\n  const i = argv.indexOf(n)\n  return i === -1 ? d : argv[i + 1]\n}\n\nconst PROJECTS = path.join(os.homedir(), '.claude', 'projects')\nconst MARKERS = path.join(os.homedir(), '.claude', 'av-markers')\n\nfunction check() {\n  const out = { projectsDir: PROJECTS, exists: fs.existsSync(PROJECTS) }\n  if (!out.exists) {\n    console.log(JSON.stringify({ ...out, ok: false, hint: 'No existe el dir de proyectos de Claude Code.' }, null, 2))\n    return\n  }\n  let latest = null\n  let version = null\n  let count = 0\n  for (const proj of fs.readdirSync(PROJECTS)) {\n    const pdir th = flag('--settings', path.join(os.homedir(), '.claude', 'settings.json'))\n  let settings = {}\n  if (fs.existsSync(settingsPath)) {\n    try {\n      settings = JSON.parse(fs.readFileSync(settingsPath, 'utf8'))\n    } catch {\n      console.error(`No pude parsear ${settingsPath}; aborto.`)\n      process.exit(1)\n    }\n  }\n  const next = JSON.parse(JSON.stringify(settings))\n  next.hooks = next.hooks || {}\n  for (const [evt, cfg] of Object.entries(HOOKS)) {\n    next.hooks[evt] = next.hooks[evt] || []\n    const already = JSON.stringify(next.hooks[evt]).includes('av-markers')\n    if (!already) next.hooks[evt].push(...cfg)\n  }\n  const rendered = JSON.stringify(next, null, 2)\n  if (has('--dry-run')) {\n    console.log('--- settings.json propuesto ---\\n' + rendered)\n    console.log(`\\n(dry-run; sidecar d…[recortado]"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/skills/instrument-source/scripts/install-hooks.mjs (file state is current in your context — no need to Read it back)","isError":false},"raw":{"toolUseId":"toolu_01PaxhnnRpmZJ9B8MMXids7m"},"kind":"tool_call","label":"tool:Write","tokens":{"input":2,"output":3312,"cacheRead":420369,"cacheCreate":1886,"total":425569},"index":87,"flags":[]},{"timestamp":"2026-06-28T22:44:13.699Z","role":"assistant","io":{"input":{"file_path":"/Users/sieteases/agent-visualizer/skills/instrument-source/scripts/setup-otel.md","content":"# Exportar OpenTelemetry-GenAI a un archivo OTLP-JSON\n\n`agent-visualizer` ingiere spans OTel-GenAI / OpenInference con el adaptador\n`otel-genai`. Cualquier sistema instrumentado con OTel puede hacerse observable sin\nSDK propio. La forma más simple para visualizar localmente es **exportar a un\narchivo OTLP-JSON** y pasárselo al CLI.\n\n## Atributos que el adaptador entiende\n\nManeja ambas convenciones (usa la que tu instrumentación emita):\n\n| concepto | OTel-GenAI | OpenInference |\n|---|---|---|\n| tipo de span | `gen_ai.operation.name` (chat/execute_tool/invoke_agent) | `openinference.span.kind` (LLM/TOOL/AGENT/CHAIN/RETRIEVER) |\n| modelo | `gen_ai.request.model` | `llm.model_name` |\n| tokens in/out | `gen_ai.usage.input_tokens` / `output_tokens` | `llm.token_count.prompt` / `completion` |\n| nombre de tool | `gen_ai.tool.name` | `tool.name` |\n| nombre de agente | `gen_ai.agent.name` | — |\n| I/O | `gen_ai.prompt` / `gen_ai.completion` | `input.value` / `output.value` |\n\nLa anidación de sub-agentes se reconstruye con `parentSpanId` (un span hijo cuelga\ndel span `AGENT` ancestro más cercano). Una sesión = un `traceId`.\n\n## Opción A — Collector de OpenTelemetry a archivo\n\nConfigura el OpenTelemetry Collector con un exporter `file`:\n\n```yaml\n# otel-collector.yaml\nreceivers:\n  otlp:\n    protocols:\n      http: {}\n      grpc: {}\nexporters:\n  file:\n    path: /tmp/spans.otlp.json   # OTLP-JSON, una entrada por export\nservice:\n  pipelines:\n    traces:\n      receivers: [otlp]\n      exporters: [file]\n```\n\nApunta tu app al collector:\n```sh\nexport OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318\n```\n\n## Opción B — Exporter de archivo directo (sin collector)\n\nMuchos SDKs de OTel permiten un exporter a stdout/archivo en formato OTLP-JSON.\nVuelca los spans a un `.json` con la forma `{ \"resourceSpans\": [ ... ] }`.\n\n## Visualizar\n\n```sh\nnode <repo>/skills/visualize-session/scripts/cli.mjs \\\n  --adapter otel-genai --session /tmp/spans.otlp.json \\\n  --html ./otel-timeline.html\n\n# si el archivo trae varios traces, lístalos y elige uno:\nnode <repo>/skills/visualize-session/scripts/cli.mjs --adapter otel-genai --file /tmp/spans.otlp.json --list\n```\n\n> Nota: muchos exports OTel no incluyen el texto completo del prompt/respuesta ni el\n> desglose de caché. El visor degrada con gracia: muestra \"n/d\" donde la fuente no\n> reporta, y los tokens al nivel que el span sí atribuye.\n"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/skills/instrument-source/scri de Code, descubiertas empíricamente\n(`version 2.1.181`). El adaptador `core/adapters/claude-code.mjs` se apoya en esto.\nPara el modelo destino agnóstico ver `core/trace-schema.md`.\n\n## Ubicación\n\n```\n~/.claude/projects/<proyecto-encoded>/<sessionId>.jsonl          # sesión principal\n~/.claude/projects/<proyecto>/<sessionId>/subagents/agent-<agentId>.jsonl\n~/.claude/projects/<proyecto>/<sessionId>/subagents/agent-<agentId>.meta.json   # {agentType}\n~/.claude/projects/<proyecto>/<sessionId>/workflows/*.jsonl\n```\n\nCada línea es un objeto JSON independiente. Campos top-level comunes:\n`type`, `uuid`, `parentUuid`, `timestamp`, `sessionId`, `cwd`, `version`,\n`gitBranch`, `isSidechain`, `userType`, `entrypoint`.\n\n## Tipos de línea relevantes\n\n- **`assistant`**: `message.model`, `message.content[]` (bloques `thinking` |\n  `text` | `tool_use`), `message.usage` con `input_tokens`, `output_tokens`,\n  `cache_creation_input_tokens`, `cache_read_input_tokens`. Una respuesta de API se\n  parte en varias entradas que comparten `requestId`/`message.id`; **solo la última\n  trae el `output_tokens` final** → se deduplica por requestId quedándose con el\n  máximo `output_tokens`.\n\n- **`user`**: `message.content` string (prompt humano) o `content[]` con bloques\n  `tool_result` (`tool_use_id`, `content`, `is_error`). `toolUseResult` trae datos\n  ricos del resultado:\n  - Agent/Task → `agentId`, `agentType`, `totalTokens`, `totalDurationMs`,\n    `totalToolUseCount`, `usage`, `toolStats` (`readCount`, `bashCount`,\n    `editFileCount`, `linesAdded`, `linesRemoved`), `resolvedModel`.\n  - AskUserQuestion → `answers` = `{ pregunta: opción_elegida }` (la decisión HITL).\n\n- **`tool_use`** (dentro de assistant): `id`, `name`, `input`.\n  - `Agent`/`Task` → sub-agente (`input.subagent_type`, `input.prompt`).\n  - `Skill` → `input.skill`.\n  - `AskUserQuestion` / `ExitPlanMode` → puntos human-in-the-loop.\n  - MCP → nombre `mcp__<server>__<tool>`.\n\n- Atribución de skill: campo `attributionSkill` en mensajes `assistant`; los\n  comandos slash aparecen como `<command-name>` en texto de usuario.\n\n- Metadata: `ai-title` (`aiTitle`), `last-prompt`, `file-history-snapshot`,\n  `queue-operation` (start/end), `attachment` (deferred tools / agent listing).\n\n## Enlaces\n\n- `tool_use.id` ↔ `tool_result.tool_use_id`.\n- Sub-agente: `toolUseResult.agentId` → archivo `subagents/agent-<agentId>.jsonl`,\n  parseado recursivamente como timeline anidado.\n- Dedupe global por `uuid` (las sesiones reanudadas re-serializan historial).\n\n## Tokens — honestidad\n\nLa granularidad real es **por turno de LLM** (`message.usage`) y **total por\nsub-agente** (`toolUseResult.totalTokens`). No hay costo de tokens por herramienta\nindividual. El adaptador atribuye los tokens del turno a un paso del turno y suma\nlos del árbol (turnos del padre + turnos de cada sub-agente) sin doble-conteo.\n"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/docs/transcript-schema.md (file state is current in your context — no need to Read it back)","isError":false},"raw":{"toolUseId":"toolu_01Kxqw3ZE8CCtVP9oZ8sv4Am"},"kind":"tool_call","label":"tool:Write","tokens":{"input":2,"output":1474,"cacheRead":426934,"cacheCreate":624,"total":429034},"index":91,"flags":[]},{"timestamp":"2026-06-28T22:48:16.724Z","role":"assistant","io":{"input":{"file_path":"/Users/sieteases/agent-visualizer/setup.sh","content":"#!/usr/bin/env bash\n# setup.sh — instala agent-visualizer como plugin local de Claude Code,\n# enlazando sus skills en ~/.claude/skills (idempotente).\n#\n# Alternativa al plugin: si usas el plugin (.claude-plugin/plugin.json) vía un\n# marketplace, no necesitas esto. Este script es para uso local rápido.\n\nset -euo pipefail\nREPO=\"$(cd \"$(dirname \"$0\")\" && pwd)\"\nDEST=\"${CLAUDE_CONFIG_DIR:-$HOME/.claude}/skills\"\n\nmkdir -p \"$DEST\"\nfor skill in visualize-session instrument-source; do\n  link=\"$DEST/$skill\"\n  target=\"$REPO/skills/$skill\"\n  if [ -L \"$link\" ] || [ -e \"$link\" ]; then\n    rm -rf \"$link\"\n  fi\n  ln -s \"$target\" \"$link\"\n  echo \"enlazada skill: $link -> $target\"\ndone\n\necho \"\"\necho \"Listo. Verifica la captura de Claude Code con:\"\necho \"  node \\\"$REPO/skills/instrument-source/scripts/install-hooks.mjs\\\" --check\"\necho \"\"\necho \"Genera un timeline con:\"\necho \"  node \\\"$REPO/skills/visualize-session/scripts/cli.mjs\\\" --list --since 7d\"\n"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/setup.sh (file state is current in your context — no need to Read it back)","isError":false},"raw":{"toolUseId":"toolu_01G9DzAccGspB2JUnAkSkknp"},"kind":"tool_call","label":"tool:Write","tokens":{"input":2,"output":560,"cacheRead":427558,"cacheCreate":1531,"total":429651},"index":92,"flags":[]},{"timestamp":"2026-06-28T22:48:54.373Z","role":"assistant","io":{"input":{"file_path":"/Users/sieteases/agent-visualizer/README.md","content":"# agent-visualizer\n\nObservabilidad de **flujos de trabajo con IA**, agnóstica al modelo/sistema.\n\nTienes observabilidad de tu *producto*; esto te da observabilidad de **cómo trabajó\nla IA**. A partir del historial de una sesión reconstruye un catastro interactivo:\nqué agentes, sub-agentes, skills y herramientas se tocaron, su I/O, los puntos\n*human-in-the-loop* (dónde decidiste tú), los tokens por turno, y los **tramos a\nrevisar** para iterar tu desarrollo con criterio.\n\n## Por qué es agnóstico\n\nEl corazón no es un parser de Claude: es un **esquema canónico de traza**\n([core/trace-schema.md](core/trace-schema.md), alineado a OpenTelemetry-GenAI /\nOpenInference) + **adaptadores por fuente**. El visor (HTML) consume solo la traza\ncanónica, así que sumar un sistema = un adaptador, sin tocar la UI.\n\nFuentes soportadas (`core/adapters/`):\n\n| fuente | adaptador | cómo |\n|---|---|---|\n| **Claude Code** | `claude-code` | transcripts automáticos en `~/.claude/projects` |\n| **agentes propios** | `ndjson` | mini-SDK `sdk/emit.{mjs,py}` → archivo NDJSON |\n| **OpenTelemetry-GenAI / OpenInference** | `otel-genai` | export OTLP-JSON (vía universal) |\n| **OpenAI / Codex CLI** | `openai-codex` | rollouts JSONL en `~/.codex/sessions` |\n| **Cursor** | `cursor` | export JSON del chat |\n\n¿Otra fuente? Copia [`core/adapters/_template.mjs`](core/adapters/_template.mjs).\n\n## Eficiencia en tokens\n\nEl trabajo pesado lo hace un script Node (transcript → JSON); un `template.html`\nestático aporta la interactividad; el modelo solo corre el script. **El historial\nnunca entra al contexto del modelo** ⇒ el costo en tokens de generar el visor es\n~constante, sin importar el tamaño de la sesión.\n\n## Uso (sin Claude Code, autónomo)\n\n```sh\n# listar sesiones de Claude Code\nnode skills/visualize-session/scripts/cli.mjs --list --since 7d\n\n# timeline de una sesión → HTML self-contained\nnode skills/visualize-session/scripts/cli.mjs --session <id> --html ./timeline.html\n\n# dashboard cross-sesión\nnode skills/visualize-session/scripts/cli.mjs --dashboard --since 7d --html ./dashboard.html\n\n# otras fuentes (autodetecta por extensión, o usa --adapter)\nnode skills/visualize-session/scripts/cli.mjs --session ./run.ndjson --html out.html\nnode skills/visualize-session/scripts/cli.mjs --adapter otel-genai --session ./spans.json --html out.html\n```\n\n## Uso (como plugin de Claude Code)\n\nLas skills se invocan en lenguaje natural: *\"visualiza esta sesión\"*, *\"dashboard de\nmis sesiones\"*, *\"haz observable a mi agente\"*. Ver\n[`skills/visualize-session`](skills/visualize-session/SKILL.md) e\n[`instrument-source`](skills/instrument-source/SKILL.md). Instalación local rápida:\n`bash setup.sh`.\n\n## \"Tramos a revisar\"\n\nCada hallazgo se etiqueta con `category` + `severity`:\n\n- **eficiencia** — caché fría, sub-agente caro (≥ p90 de tokens).\n- **fricción** — errores de tool, reintentos, interrupciones.\n- **latencia** — sub-agente lento (≥ p90 de duración).\n- **calidad** — respuesta/razonamiento flojo. Lo detecta un paso **opcional** de\n  LLM-judge ([core/judge.mjs](core/judge.mjs)), **backend-agnóstico**:\n  - `harness` (recomendado): usa **el modelo del chat** que llamó la skill\n    (sub-agentes) — cero key, cero costo extra, ideal si pagas suscripción.\n  - `local`: modelo local OpenAI-compatible (Ollama/LM Studio) — sin key, sin costo.\n  - `api`: solo si tienes key (Anthropic u OpenAI-compatible).\n\n  Las tres primeras categorías son **mecánicas** (cero LLM, cero tokens).\n\n## Honestidad de tokens\n\nLa granularidad real es por turno de LLM y por sub-agente, **no por herramienta**.\nEl visor lo refleja; las fuentes que no reportan tokens muestran \"n/d\".\n\n## Layout\n\n```\ncore/                    # AGNÓSTICO\n  trace-schema.{md,json} # esquema canónico (contrato)\n  render.mjs             # traza → datos para el HTML + findings mecánicos\n  judge.mjs              # LLM-judge opcional, backend-agnóstico\n  adapters/              # un adaptador por fuente (detect/parse/listSessions)\nsdk/emit.{mjs,py}       …[recortado]"},"output":"File created successfully at: /Users/sieteases/agent-visualizer/README.md (file state is current in your context — no need to Read it back)","isError":false},"raw":{"toolUseId":"toolu_01EASHPAnBUFttNfGNDsrUig"},"kind":"tool_call","label":"tool:Write","tokens":{"input":2,"output":2099,"cacheRead":429089,"cacheCreate":611,"total":431801},"index":93,"flags":[]},{"timestamp":"2026-06-28T22:49:12.334Z","kind":"message","role":"assistant","label":"respuesta","text":"Ahora la verificación final: dashboard, `--check` de hooks, y validez de sintaxis del JS de los templates.","io":null,"index":94,"flags":[],"tokens":{"input":2,"output":1131,"cacheRead":429700,"cacheCreate":2148,"total":432981}},{"timestamp":"2026-06-28T22:49:18.868Z","role":"assistant","io":{"input":{"command":"cd /Users/sieteases/agent-visualizer\necho \"=== 1) install-hooks --check ===\"\nnode skills/instrument-source/sc const fmt = n => n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n||0);

// ---- Markdown ligero ----
function md(src){
  if(src==null) return '';
  let s=esc(String(src)); const fences=[];
  s=s.replace(/```([\w-]*)\n?([\s\S]*?)```/g,(m,lang,code)=>{fences.push(`<pre class="code">${code.replace(/\n+$/,'')}</pre>`);return ` F${fences.length-1} `;});
  const lines=s.split('\n'),out=[]; let para=[],list=null;
  const fp=()=>{if(para.length){out.push('<p>'+para.join('<br>')+'</p>');para=[];}};
  const fl=()=>{if(list){out.push(`<${list.t}>`+list.items.map(i=>'<li>'+i+'</li>').join('')+`</${list.t}>`);list=null;}};
  for(let ln of lines){
    if(/^ F\d+ $/.test(ln.trim())){fp();fl();out.push(ln.trim());continue;}
    let m;
    if((m=ln.match(/^(#{1,6})\s+(.*)$/))){fp();fl();const n=m[1].length;out.push(`<h${n}>${inline(m[2])}</h${n}>`);continue;}
    if(/^\s*&gt;\s?/.test(ln)){fp();fl();out.push(`<blockquote>${inline(ln.replace(/^\s*&gt;\s?/,''))}</blockquote>`);continue;}
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(ln)){fp();fl();out.push('<hr>');continue;}
    if((m=ln.match(/^\s*[-*+]\s+(.*)$/))){fp();if(!list||list.t!=='ul'){fl();list={t:'ul',items:[]};}list.items.push(inline(m[1]));continue;}
    if((m=ln.match(/^\s*\d+\.\s+(.*)$/))){fp();if(!list||list.t!=='ol'){fl();list={t:'ol',items:[]};}list.items.push(inline(m[1]));continue;}
    if(ln.trim()===''){fp();fl();continue;}
    para.push(inline(ln));
  }
  fp();fl();
  return out.join('\n').replace(/ F(\d+) /g,(m,i)=>fences[+i]);
}
function inline(s){ return s.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\b_([^_]+)_\b/g,'<em>$1</em>').replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>'); }

// ---- render input/output ----
const CODE_KEYS=new Set(['command','code','content','file_text','sql','query','patch','script','body']);
const MD_KEYS=new Set(['prompt','description','instructions','text','message','question']);
function diffBlock(o,n){let h='<div class="diff">';if(o!=null){h+='<div class="hd">antes</div>';String(o).split('\n').forEach(l=>h+=`<div class="dl del">- ${esc(l)}</div>`);}if(n!=null){h+='<div class="hd">después</div>';String(n).split('\n').forEach(l=>h+=`<div class="dl add">+ ${esc(l)}</div>`);}return h+'</div>';}
function renderObj(obj){
  if(Array.isArray(obj)) return `<pre class="code">${esc(JSON.stringify(obj,null,2))}</pre>`;
  let h='';
  for(const k of Object.keys(obj)){
    const v=obj[k]; if(v==null) continue; if(k==='old_string'||k==='new_string') continue;
    if(typeof v==='object') h+=`<div class="kv"><span class="kk">${esc(k)}</span><div class="kvv">${renderObj(v)}</div></div>`;
    else if(CODE_KEYS.has(k)) h+=`<div class="kv"><span class="kk">${esc(k)}</span><div class="kvv"><pre class="code">${esc(String(v))}</pre></div></div>`;
    else if(MD_KEYS.has(k)) h+=`<div class="kv"><span class="kk">${esc(k)}</span><div class="kvv mdwrap">${md(v)}</div></div>`;
    else h+=`<div class="kv"><span class="kk">${esc(k)}</span><span class="kvs">${esc(String(v))}</span></div>`;
  }
  if(obj.old_string!=null||obj.new_string!=null) h+=diffBlock(obj.old_string,obj.new_string);
  return h;
}
function renderVal(v){ if(v==null)return''; if(typeof v==='object')return renderObj(v); const s=String(v).trim(); if((s.startsWith('{')&&s.endsWith('}'))||(s.startsWith('[')&&s.endsWith(']'))){try{return renderObj(JSON.parse(s));}catch(e){}} return `<div class="mdwrap">${md(v)}</div>`; }
function field(l,inner,err){return `<div class="iofield ${err?'err':''}"><span class="k">${esc(l)}</span>${inner}</div>`;}
function ioBlock(s){let h='';if(s.text)h+=field('texto',`<div class="mdwrap">${md(s.text)}</div>`);if(s.io){if(s.io.input!=null)h+=field('input',renderVal(s.io.input));if(s.io.output!=null)h+=field('output'+(s.io.isError?' · ERROR':''),renderVal(s.io.output),s.io.isError);if(s.io.truncated)h+='<div class="truncated">… (recortado)</div>';}return h;}
function decisionBlock(d){if(!d)return'';let h=field('pregunta',`<div class="mdwrap">${md(d.prompt||'')}</div>`);const chosen=(d.chosen||[]).map(String);let opts='';(d.options||[]).forEach(o=>{const c=chosen.some(x=>x===o.label||(o.label&&x.includes(o.label)));opts+=`<div class="opt ${c?'chosen':''}"><div class="lab">${esc(o.label)}${c?' <span class="chosen-tag">✓ elegida</span>':''}</div>${o.description?`<div class="desc">${esc(o.description)}</div>`:''}</div>`;});if(opts)h+=opts;if(chosen.length)h+=field('decisión del usuario',`<div class="mdwrap">${md(chosen.join('\n\n— '))}</div>`);return h;}
function statsLine(st){const p=[];if(st.toolUseCount)p.push(st.toolUseCount+' tools');if(st.readCount)p.push(st.readCount+' reads');if(st.bashCount)p.push(st.bashCount+' bash');if(st.editFileCount)p.push(st.editFileCount+' edits');if(st.linesAdded||st.linesRemoved)p.push(`+${st.linesAdded||0}/-${st.linesRemoved||0}`);return p.join(' · ');}

// ---- header / legend / timeline ----
function header(){
  document.getElementById('title').textContent = DATA.title || ('Sesión '+(DATA.sessionId||''));
  const s=DATA.summary||{}; const span=DATA.startedAt?`${DATA.startedAt.slice(0,16).replace('T',' ')} → ${(DATA.endedAt||'').slice(0,16).replace('T',' ')}`:'';
  document.getElementById('sub').textContent=`fuente: ${DATA.source} · modelos: ${(s.models||[]).join(', ')||'n/d'} · ${span}`;
  const sc=s.stepCounts||{}, st=(b,l)=>`<div class="stat"><b>${b}</b><span>${l}</span></div>`;
  const total=Object.values(sc).reduce((a,b)=>a+b,0);
  document.getElementById('stats').innerHTML=st(fmt(total),'pasos')+st(fmt((s.tokens||{}).total||0),'tokens')+st(sc.agent||0,'sub-agentes')+st(sc.tool_call||0,'herramientas')+st((s.decisions||[]).length,'decisiones')+st((s.findings||[]).length,'a revisar')+st(ms(s.durationMs)||'n/d','duración');
}
function legend(){
  const sc=(DATA.summary&&DATA.summary.stepCounts)||{};
  document.getElementById('legend').innerHTML=Object.keys(sc).map(k=>`<span class="lg"><span class="kdot" style="background:${kc(k)}"></span>${KIND_ES[k]||k}</span>`).join('');
}
function timeline(){
  const tl=document.getElementById('timeline'); tl.innerHTML='';
  (DATA.steps||[]).forEach((s,i)=>{
    const it=document.createElement('div'); it.className='tlitem '+(i%2?'right':'left'); it.style.setProperty('--c',kc(s.kind));
    const tokN=s.kind==='agent'&&s.agent?(s.agent.totalTokens||0):(s.tokens&&s.tokens.total||0);
    const tok=tokN?`<span class="tok">${fmt(tokN)} tok</span>`:'';
    const ts=s.timestamp?s.timestamp.slice(11,19):'';
    const calls=s.kind==='agent'&&s.agent?`<span class="tok">${(s.agent.stats&&s.agent.stats.toolUseCount)||(s.agent.steps?s.agent.steps.length:0)} llamadas</span>`:'';
    it.innerHTML=`<div class="tlcard k-${s.kind} ${s.flags&&s.flags.length?'flagged':''}" data-uid="${s._uid}">
      <div class="tlcard-h"><span class="kdot" style="background:${kc(s.kind)}"></span><span class="ttl">${esc(s.label||KIND_ES[s.kind]||s.kind)}</span></div>
      <div class="tlcard-m">${ts?`<span>${ts}</span>`:''}${s.role?`<span>${role2(s.role)}</span>`:''}${tok}${calls}</div>
    </div>`;
    it.querySelector('.tlcard').onclick=()=>select(s._uid);
    tl.appendChild(it);
  });
}

// ---- selección / detalle ----
function select(uid){
  document.querySelectorAll('.tlcard.active').forEach(e=>e.classList.remove('active'));
  const card=document.querySelector(`.tlcard[data-uid="${uid}"]`); if(card)card.classList.add('active');
  detailFor(REG.get(uid), []);
  document.getElementById('right').scrollTop=0;
}
function detailHeader(s,crumbs){
  const nav = crumbs.length?`<button class="back" id="back">← volver</button>`:`<button class="home" id="home">inicio</button>`;
  const tokN=s.kind==='agent'&&s.agent?(s.agent.totalTokens||0):(s.tokens&&s.tokens.total||0);
  return `<div class="d-h"><span class="kdot" style="background:${kc(s.kind)}"></span><span class="d-ttl">${esc(s.label||s.kind)}</span>${nav}</div>
    <div class="d-meta">${[s.role?role2(s.role):'',s.timestamp?s.timestamp.replace('T',' ').slice(0,19):'',tokN?fmt(tokN)+' tok':'',s.durationMs?ms(s.durationMs):''].filter(Boolean).join(' · ')}</div>`;
}
function detailFor(s,crumbs){
  const right=document.getElementById('right'), d=document.getElementById('detail');
  if(s.kind==='agent'&&s.agent&&s.agent.steps&&s.agent.steps.length){ right.classList.add('right-split'); d.innerHTML=agentDetail(s,crumbs); wireAgent(s,crumbs); }
  else { right.classList.remove('right-split'); let body=(s.kind==='decision'?decisionBlock(s.decision):'')+ioBlock(s); d.innerHTML=detailHeader(s,crumbs)+(body||'<div class="empty">sin I/O</div>'); }
  wireNav(crumbs);
}
function agentDetail(s,crumbs){
  const subs=s.agent.steps;
  const graph=subs.map((c,i)=>`<div class="hitem ${i%2?'down':'up'}" style="--c:${kc(c.kind)}">
      <div class="hcard" data-i="${i}">
        <div class="tlcard-h"><span class="kdot" style="background:${kc(c.kind)}"></span><span class="ttl">${esc(short(c.label||c.kind))}</span></div>
        <div class="tlcard-m"><span>#${i+1}</span>${c.timestamp?`<span>${c.timestamp.slice(11,19)}</span>`:''}${c.tokens&&c.tokens.total?`<span class="tok">${fmt(c.tokens.total)} tok</span>`:''}</div>
      </div></div>`).join('');
  const list=subs.map((c,i)=>subNode(c,i)).join('');
  const st=s.agent.stats?statsLine(s.agent.stats):'';
  return `<div class="agentview">
    <div class="av-head">${detailHeader(s,crumbs)}</div>
    <div class="av-graph"><div class="agraph-wrap"><div class="d-sub" style="margin-top:0">grafo de llamadas (${subs.length})${st?' · '+st:''}</div><div class="htl">${graph}</div></div></div>
    <div class="av-body">
      ${s.agent.prompt?`<div class="d-sub">prompt del sub-agente</div>${field('prompt',`<div class="mdwrap">${md(s.agent.prompt)}</div>`)}`:''}
      <div class="d-sub">sub-llamadas</div><div class="sublist">${list}</div>
    </div>
  </div>`;
}
function subNode(c,i){
  const isAgent=c.kind==='agent'&&c.agent&&c.agent.steps&&c.agent.steps.length;
  const body=(c.kind==='decision'?decisionBlock(c.decision):'')+ioBlock(c);
  const tok=c.tokens&&c.tokens.total?`<span class="tok">${fmt(c.tokens.total)}</span>`:'';
  return `<div class="subnode ${c.flags&&c.flags.length?'flagged':''}" data-i="${i}" id="sub-${i}">
    <div class="subrow"><span class="caret">▶</span><span class="kdot" style="background:${kc(c.kind)}"></span><span class="sl">${esc(c.label||c.kind)}</span>${isAgent?'<span class="drill">abrir sub-agente →</span>':''}<span class="meta">${tok}${c.timestamp?`<span>${c.timestamp.slice(11,19)}</span>`:''}</span></div>
    <div class="subbody">${body||'<div class="empty">sin I/O</div>'}</div></div>`;
}
function wireAgent(s,crumbs){
  const d=document.getElementById('detail');
  d.querySelectorAll('.hcard').forEach(ch=>ch.onclick=()=>{const sn=d.querySelector('#sub-'+ch.dataset.i);if(sn){sn.classList.add('open');sn.scrollIntoView({behavior:'smooth',block:'start'});flash(sn);}});
  d.querySelectorAll('.subnode').forEach(sn=>{
    const i=+sn.dataset.i;
    sn.querySelector('.subrow').onclick=e=>{
      if(e.target.classList.contains('drill')){ detailFor(s.agent.steps[i], crumbs.concat([s])); document.getElementById('right').scrollTop=0; return; }
      sn.classList.toggle('open');
    };
  });
}
function wireNav(crumbs){
  const back=document.getElementById('back'); if(back) back.onclick=()=>{ const prev=crumbs[crumbs.length-1]; detailFor(prev, crumbs.slice(0,-1)); document.getElementById('right').scrollTop=0; };
  const home=document.getElementById('home'); if(home) home.onclick=defaultDetail;
}
function flash(el){el.style.outline='2px solid '+css('--acc');setTimeout(()=>el.style.outline='',1200);}

// ---- vista por defecto del panel derecho: overview ----
function defaultDetail(){
  document.getElementById('right').classList.remove('right-split');
  document.querySelectorAll('.tlcard.active').forEach(e=>e.classList.remove('active'));
  const s=DATA.summary||{}; const sc=s.stepCounts||{};
  const byKind=Object.keys(sc).map(k=>`<span class="lg"><span class="kdot" style="background:${kc(k)}"></span>${KIND_ES[k]||k}: ${sc[k]}</span>`).join('');
  const ag=(s.agents||[]).slice().sort((a,b)=>b.tokens-a.tokens).slice(0,8)
    .map(a=>`<div class="kv"><span class="kk">${esc(a.name||'?')}</span><span class="kvs">${fmt(a.tokens)} tok · ${a.durationMs?ms(a.durationMs):'?'}${a.stats&&a.stats.toolUseCount?' · '+a.stats.toolUseCount+' tools':''}</span></div>`).join('');
  document.getElementById('detail').innerHTML=
    `<div class="d-h"><span class="d-ttl">${esc(DATA.title||'Resumen de la sesión')}</span></div>
     <div class="d-meta">Selecciona un paso en la línea de tiempo para ver su I/O. Las cards de <b>sub-agente</b> abren su grafo de llamadas y el detalle de cada sub-llamada. Los <b>tramos a revisar</b> están en el acordeón inferior.</div>
     <div class="d-sub">composición</div><div class="legend" style="padding:0">${byKind}</div>
     ${ag?`<div class="d-sub">sub-agentes por tokens</div>${ag}`:''}`;
}

// ---- acordeón inferior: tramos a revisar ----
function renderFindings(){
  const f=(DATA.summary&&DATA.summary.findings)||[];
  document.getElementById('facc-title').textContent=`Tramos a revisar (${f.length})`;
  const order={alta:0,media:1,baja:2};
  const sorted=f.slice().sort((a,b)=>(order[a.severity]??3)-(order[b.severity]??3));
  const body=document.getElementById('facc-body');
  body.innerHTML = sorted.length ? sorted.map((x,n)=>`
    <div class="finding ${x.severity}" data-fi="${n}">
      <div class="cat"><span class="sevdot" style="background:${css('--'+x.severity)}"></span>${esc(x.category)} · ${esc(x.severity)}${x.source==='judge'?' · calidad/LLM':''}</div>
      <div class="why">${esc(x.why)}</div>
      <code class="path">${esc(x.path||'')}${esc(x.label||'')}</code>
      ${x.recommendation?`<div class="why" style="color:var(--acc)">→ ${esc(x.recommendation)}</div>`:''}
    </div>`).join('') : '<div class="empty">Sin tramos marcados.</div>';
  body.querySelectorAll('.finding').forEach(el=>el.onclick=()=>gotoFinding(sorted[+el.dataset.fi]));
  document.getElementById('facc-toggle').onclick=()=>document.getElementById('facc').classList.toggle('open');
}
function gotoFinding(x){
  // ubica el paso por (index,label); si es anidado abre su ancestro de tope
  for(const [uid,s] of REG){
    if(s.index===x.index && (s.label||'')===(x.label||'')){
      const top=uid.split('.')[0];
      select(top);
      if(uid.includes('.')){ const seg=uid.split('.')[1]; setTimeout(()=>{const sn=document.querySelector('#sub-'+seg);if(sn){sn.classList.add('open');sn.scrollIntoView({behavior:'smooth',block:'start'});flash(sn);}},60); }
      return;
    }
  }
}

// ---- búsqueda ----
document.getElementById('q').oninput=e=>{ const q=e.target.value.toLowerCase();
  document.querySelectorAll('#timeline .tlitem').forEach(it=>{ it.style.display=(!q||it.textContent.toLowerCase().includes(q))?'':'none'; });
};

indexSteps(DATA.steps);
header(); legend(); timeline(); defaultDetail(); renderFindings();
</script>
</body>
</html>
