<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ai-emos — timeline de sesión</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --tx:#e6e8ee; --mut:#9aa3b2; --acc:#6ea8fe;
    --message:#9aa3b2; --thinking:#5d6675; --llm_call:#6ea8fe; --tool_call:#c9a0ff;
    --agent:#ffb86b; --skill:#6ee7ff; --decision:#ff7eb6; --event:#4a5160;
    --alta:#ff6b6b; --media:#ffb86b; --baja:#7ec8ff;
    --hh:64px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  /* header delgado en una fila: título+detalles a la izquierda, stats a la derecha */
  header{display:flex;align-items:center;gap:18px;padding:9px 20px;background:var(--panel);border-bottom:1px solid var(--line);height:var(--hh);}
  .hgroup{min-width:0;}
  h1{font-size:16px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sub{color:var(--mut);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stats{display:flex;flex-wrap:nowrap;gap:8px;margin-left:auto;overflow-x:auto;padding-bottom:1px;}
  .stat{flex:none;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;text-align:center;}
  .stat b{font-size:14px;} .stat span{color:var(--mut);font-size:10px;display:block;}
  .langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none;}
  .langtoggle button{border:0;border-radius:0;padding:4px 8px;background:var(--panel2);color:var(--mut);font-size:11px;cursor:pointer;}
  .langtoggle button.on{background:var(--acc);color:#0b0d11;font-weight:600;}
  /* resumen ampliado: botón "ver más" + dropdown con toda la info de la sesión */
  .morewrap{position:relative;flex:none;}
  /* mismo box que los .stat: dos líneas (valor/flecha + etiqueta), mismo alto */
  .morebtn{flex:none;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;text-align:center;color:var(--fg);cursor:pointer;white-space:nowrap;font:inherit;}
  .morebtn b{font-size:14px;display:block;line-height:1.2;} .morebtn span{color:var(--mut);font-size:10px;display:block;}
  .morebtn:hover{border-color:var(--acc);} .morebtn.on{border-color:var(--acc);}
  .morepanel{position:absolute;top:calc(100% + 8px);right:0;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.45);padding:14px 16px;min-width:340px;max-width:min(620px,92vw);}
  .morepanel[hidden]{display:none;}
  .mp-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:0 0 9px;}
  .mp-stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .mp-meta{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12px;margin:0;}
  .mp-meta dt{color:var(--mut);white-space:nowrap;} .mp-meta dd{margin:0;color:var(--fg);word-break:break-word;}
  .layout{display:grid;grid-template-columns:minmax(300px,34%) 1fr;}
  #left{border-right:1px solid var(--line);height:calc(100vh - var(--hh));overflow:auto;padding:14px 8px 60px;}
  #right{height:calc(100vh - var(--hh));overflow:auto;padding:18px 22px 60px;}
  .lefthead{display:flex;gap:8px;align-items:center;padding:0 10px 10px;}
  .lefthead input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:6px 10px;}
  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:0 10px 12px;}
  .lg{font-size:11px;color:var(--mut);display:flex;align-items:center;gap:4px;}
  .lg .kdot{width:8px;height:8px;}

  /* eje + cards zigzag */
  .tl{position:relative;}
  .tl::before{content:'';position:absolute;left:50%;transform:translateX(-1px);top:0;bottom:0;width:2px;background:var(--line);}
  .tlitem{position:relative;width:50%;padding:7px 16px;}
  .tlitem.left{left:0;}
  .tlitem.right{left:50%;}
  .tlitem::after{content:'';position:absolute;top:15px;width:11px;height:11px;border-radius:50%;background:var(--bg);border:2px solid var(--c,#888);z-index:1;}
  .tlitem.left::after{right:-6px;} .tlitem.right::after{left:-6px;}
  .tlcard{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--c);border-radius:10px;padding:8px 11px;cursor:pointer;}
  .tlcard:hover{border-color:var(--acc);}
  .tlcard.active{outline:2px solid var(--acc);}
  .tlcard.flagged{box-shadow:inset 0 0 0 1px var(--media);}
  .tlcard-h{display:flex;align-items:center;gap:7px;}
  .tlcard-h .ttl{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tlcard-m{color:var(--mut);font-size:11px;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .kdot{width:9px;height:9px;border-radius:50%;flex:none;}
  .tok{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:0 6px;font-size:10px;color:var(--mut);}

  /* detalle */
  .d-h{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
  .d-ttl{font-size:16px;font-weight:600;}
  .d-meta{color:var(--mut);font-size:12px;margin-bottom:12px;}
  .d-sub{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:16px 0 7px;}
  .back,.home{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:12px;}
  .back:hover,.home:hover{border-color:var(--acc);}
  .empty{color:var(--mut);font-style:italic;}

  /* detalle de sub-agente: dos cards apiladas (cabecera+grafo / lista scrolleable) */
  #right.right-split{overflow:hidden;display:flex;flex-direction:column;}
  #right.right-split #detail{flex:1;display:flex;min-height:0;}
  /* min-width:0 deja que el flex constriña el ancho → el overflow-x interno funciona */
  .agentview{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0;gap:12px;}

  /* card 1: título + detalles + grafo horizontal */
  .av-graphcard{flex:none;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .av-graphcard .d-h{margin-bottom:4px;} .av-graphcard .d-meta{margin-bottom:0;}

  /* card 2: lista de sub-llamadas, scrolleable e independiente del grafo */
  .av-listcard{flex:1;min-height:0;min-width:0;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .av-listhead{flex:none;padding:9px 14px;border-bottom:1px solid var(--line);}
  .av-listbody{flex:1;min-height:0;overflow-y:auto;padding:12px 14px 24px;}
  .av-listbody .d-sub:first-child{margin-top:0;}

  /* grafo HORIZONTAL (espejo del eje vertical) — scroll-x en .htl; track interno
     ancho-de-contenido para que la línea y las cards no se recorten */
  .htl{overflow-x:auto;overflow-y:hidden;padding-bottom:8px;}
  .htrack{position:relative;display:flex;align-items:center;min-width:min-content;min-height:184px;padding:10px 8px;}
  .htrack::before{content:'';position:absolute;left:10px;right:10px;top:50%;transform:translateY(-1px);height:2px;background:var(--line);}
  .hitem{position:relative;flex:0 0 158px;height:154px;}
  .hitem::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:var(--bg);border:2px solid var(--c,#888);z-index:2;}
  .hcard{position:absolute;left:8px;right:8px;background:var(--panel2);border:1px solid var(--line);border-left:4px solid var(--c);border-radius:10px;padding:7px 10px;cursor:pointer;}
  .hcard:hover{border-color:var(--acc);}
  .hcard.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc);}
  .hitem.up .hcard{bottom:calc(50% + 12px);} .hitem.down .hcard{top:calc(50% + 12px);}

  /* sub-llamadas */
  .sublist{display:flex;flex-direction:column;gap:6px;}
  .subnode{border:1px solid var(--line);border-radius:8px;background:var(--panel2);scroll-margin-top:10px;}
  .subnode.flagged{box-shadow:inset 3px 0 0 var(--media);}
  .subrow{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;}
  .subrow .sl{font-weight:600;font-size:13px;}
  .subrow .meta{margin-left:auto;color:var(--mut);font-size:11px;display:flex;gap:8px;align-items:center;}
  .subrow .drill{color:var(--agent);font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 7px;}
  .subbody{display:none;padding:0 11px 10px;}
  .subnode.open .subbody{display:block;}
  .caret{color:var(--mut);transition:transform .12s;font-size:10px;}
  .subnode.open .caret{transform:rotate(90deg);}

  /* I/O + markdown */
  .iofield{background:#0b0d11;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:6px;max-height:460px;overflow:auto;}
  .iofield.err{border-color:#5a2b2b;}
  .iofield > .k{color:var(--mut);text-transform:uppercase;font-size:10px;letter-spacing:.05em;display:block;margin-bottom:5px;}
  .truncated{color:var(--media);font-size:11px;}
  .mdwrap{word-break:break-word;}
  .mdwrap h1,.mdwrap h2,.mdwrap h3,.mdwrap h4{margin:.5em 0 .3em;line-height:1.25;}
  .mdwrap h1{font-size:16px;} .mdwrap h2{font-size:15px;} .mdwrap h3{font-size:14px;} .mdwrap h4{font-size:13px;color:var(--mut);}
  .mdwrap p{margin:.4em 0;} .mdwrap ul,.mdwrap ol{margin:.3em 0;padding-left:20px;} .mdwrap li{margin:.1em 0;}
  .mdwrap a{color:var(--acc);} .mdwrap strong{color:var(--tx);} .mdwrap em{color:var(--mut);}
  .mdwrap blockquote{border-left:3px solid var(--line);margin:.4em 0;padding:.1em 10px;color:var(--mut);}
  .mdwrap hr{border:0;border-top:1px solid var(--line);margin:.6em 0;}
  .mdwrap code{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;}
  pre.code{background:#05070a;border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin:.4em 0;overflow:auto;white-space:pre-wrap;word-break:break-word;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;color:#d6deea;}
  .kv{margin:5px 0;} .kv .kk{color:var(--acc);font-size:11px;font-weight:600;} .kv .kvs{margin-left:6px;} .kv .kvv{margin-top:3px;}
  /* gráficos del overview (herramientas/tokens por turno) */
  .chartcard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin:6px 0;}
  .charttitle{font-size:12px;color:var(--mut);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .charttitle .qm{cursor:help;border:1px solid var(--line);border-radius:50%;width:13px;height:13px;line-height:11px;text-align:center;font-size:9px;color:var(--mut);}
  .chartsvg{display:block;width:100%;height:auto;}
  .pierow{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .pie{flex:none;width:220px;height:220px;}
  .chartlegend{display:flex;flex-wrap:wrap;gap:6px 8px;}
  /* leyenda clicable: aísla una herramienta (o "todos") en el chart por turno */
  .lgsel{font-size:11px;color:var(--mut);display:flex;align-items:center;gap:4px;cursor:pointer;padding:1px 7px;border:1px solid transparent;border-radius:7px;user-select:none;}
  .lgsel:hover{border-color:var(--line);color:var(--tx);}
  .lgsel.on{border-color:var(--acc);color:var(--tx);background:var(--panel2);}
  .lgsel .kdot{width:9px;height:9px;border-radius:50%;flex:none;}
  .lgsel .kall{background:conic-gradient(#6ea8fe,#c9a0ff,#6ee7ff,#ffb86b,#ff7eb6,#6ea8fe);}
  .diff{border:1px solid var(--line);border-radius:6px;overflow:hidden;margin:.4em 0;font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;}
  .diff .dl{padding:1px 10px;white-space:pre-wrap;word-break:break-word;}
  .diff .del{background:rgba(255,107,107,.12);color:#ff9d9d;} .diff .add{background:rgba(126,224,192,.12);color:#9af3d2;}
  .diff .hd{background:var(--panel2);color:var(--mut);font-size:10px;text-transform:uppercase;padding:2px 10px;letter-spacing:.04em;}
  .opt{border:1px solid var(--line);border-radius:6px;padding:6px 9px;margin:4px 0;}
  .opt.chosen{border-color:#7ee0c0;box-shadow:inset 3px 0 0 #7ee0c0;}
  .opt .lab{font-weight:600;} .opt .desc{color:var(--mut);font-size:12px;} .chosen-tag{color:#7ee0c0;font-size:11px;}

  /* feed EN VIVO: pila de toasts con los tramos a revisar recién aparecidos.
     Inerte en el HTML guardado/standalone (nadie emite eventos 'finding'). */
  #livefeed{position:fixed;left:16px;bottom:16px;z-index:70;display:flex;flex-direction:column-reverse;gap:8px;max-width:340px;}
  .lftoast{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--c,var(--media));border-radius:10px;padding:8px 11px;box-shadow:0 4px 14px rgba(0,0,0,.45);cursor:pointer;animation:lfin .18s ease-out;}
  .lftoast:hover{border-color:var(--acc);}
  .lftoast .lfh{display:flex;align-items:center;gap:7px;}
  .lftoast .lfcat{text-transform:uppercase;letter-spacing:.04em;font-size:10px;font-weight:600;color:var(--mut);}
  .lftoast .lfx{margin-left:auto;color:var(--mut);font-size:15px;line-height:1;padding:0 3px;}
  .lftoast .lfwhy{color:var(--tx);font-size:12px;margin-top:3px;word-break:break-word;}
  @keyframes lfin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<header>
  <div class="hgroup">
    <h1 id="title">Timeline de sesión</h1>
    <div class="sub" id="sub"></div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="morewrap"><button class="morebtn" id="morebtn" aria-expanded="false"></button><div class="morepanel" id="morepanel" hidden></div></div>
  <div class="langtoggle" id="langtoggle"></div>
</header>
<div class="layout">
  <div id="left">
    <div class="lefthead"><input type="search" id="q" placeholder="buscar en la línea de tiempo…" /></div>
    <div class="legend" id="legend"></div>
    <div class="tl" id="timeline"></div>
  </div>
  <div id="right"><div id="detail"></div></div>
</div>
<div id="livefeed" aria-live="polite"></div>

<script id="report-data" type="application/json">
{"schemaVersion":1,"source":"demo","sessionId":"demo","title":"(sin datos — inyecta el JSON aquí)","steps":[],"summary":{"stepCounts":{},"tokens":{"total":0},"agents":[],"skills":[],"decisions":[],"findings":[],"findingsByCategory":{},"models":[]}}
</script>

<script>
let DATA = JSON.parse(document.getElementById('report-data').textContent);

// ---- i18n (ES por defecto; auto-detecta y permite toggle ES|EN) ----
const I18N = {
  es: {
    docTitle:'ai-emos — timeline de sesión', h1:'Timeline de sesión', searchPh:'buscar en la línea de tiempo…',
    source:'fuente', models:'modelos', na:'n/d',
    stSteps:'pasos', stTokens:'tokens', stTurns:'turnos', stAgents:'sub-agentes', stTools:'herramientas',
    stSkills:'skills', stDecisions:'decisiones', stReview:'a revisar', stDuration:'duración',
    tokensTip:'El titular son tokens FRESCOS (input+output): lo que el modelo generó/ingirió nuevo. El total bruto incluye la caché re-leída en cada turno (barata, pero infla la cifra).',
    tokFresh:'frescos (input+output)', tokTotal:'total bruto', tokCacheRead:'caché re-leída', tokCacheCreate:'caché creada',
    moreBtn:'ver más', lessBtn:'ver menos', sessionSummary:'Resumen de la sesión', mSpan:'periodo', mId:'id', mCwd:'carpeta', mTokens:'tokens',
    calls:'llamadas', back:'← volver', home:'inicio', noIO:'sin I/O',
    callGraph:'grafo de llamadas ({0})', subCalls:'sub-llamadas ({0})', subAgentPrompt:'prompt del sub-agente',
    callsLabel:'llamadas', openSubAgent:'abrir sub-agente →',
    before:'antes', after:'después', text:'texto', input:'input', output:'output', errorTag:' · ERROR',
    truncated:'… (recortado)', question:'pregunta', chosen:'✓ elegida', userDecision:'decisión del usuario',

    overviewHint:'Selecciona un paso en la línea de tiempo para ver su I/O. Las cards de <b>sub-agente</b> abren su grafo de llamadas y el detalle de cada sub-llamada. Los <b>tramos a revisar</b> están en un reporte aparte.',
    composition:'composición', skillsUsed:'skills usadas', subAgentsByTokens:'sub-agentes por tokens',
    tokensPerTurn:'tokens por turno · qué corrió cada uno', tokensPerTurnTip:'Los tokens del log se reportan por turno de LLM, no por herramienta individual.',
    chToolsCount:'herramientas por turno (nº de usos)', chToolsTokens:'tokens por herramienta (proporción)',
    chTokensTurn:'tokens por turno (frescos: input+output)',
    chToolsTokensTip:'Aproximado: el log reporta tokens por turno, no por herramienta. Se reparten proporcionalmente entre las herramientas que corrió cada turno.',
    chTokensTurnTip:'Tokens frescos generados en cada turno (input+output); excluye la relectura de contexto cacheado.',
    axisTurn:'turno', catSub:'subagente', catSkill:'skill', catOtros:'otras', catAll:'todos', catReason:'razonamiento', turnActivity:'actividad por turno',
    turn:'Turno', dismiss:'descartar', findingsBadge:'⚑ Tramos a revisar ({0})', segment:'tramo',
    role:{user:'usuario',assistant:'asistente',system:'sistema',tool:'tool'},
    kind:{message:'mensaje',thinking:'razonamiento',llm_call:'llamada LLM',tool_call:'herramienta',agent:'sub-agente',skill:'skill',decision:'decisión',event:'evento'},
    cat:{friccion:'fricción',eficiencia:'eficiencia',latencia:'latencia',calidad:'calidad'},
    sev:{alta:'alta',media:'media',baja:'baja'},
    via:{'skill-tool':'tool Skill','command':'slash-command','bash':'script (Bash)'},
  },
  en: {
    docTitle:'ai-emos — session timeline', h1:'Session timeline', searchPh:'search the timeline…',
    source:'source', models:'models', na:'n/a',
    stSteps:'steps', stTokens:'tokens', stTurns:'turns', stAgents:'sub-agents', stTools:'tools',
    stSkills:'skills', stDecisions:'decisions', stReview:'to review', stDuration:'duration',
    tokensTip:'The headline is FRESH tokens (input+output): what the model actually generated/ingested. The raw total includes cached context re-read each turn (cheap, but it inflates the number).',
    tokFresh:'fresh (input+output)', tokTotal:'raw total', tokCacheRead:'cache re-read', tokCacheCreate:'cache created',
    moreBtn:'see more', lessBtn:'see less', sessionSummary:'Session summary', mSpan:'span', mId:'id', mCwd:'folder', mTokens:'tokens',
    calls:'calls', back:'← back', home:'home', noIO:'no I/O',
    callGraph:'call graph ({0})', subCalls:'sub-calls ({0})', subAgentPrompt:'sub-agent prompt',
    callsLabel:'calls', openSubAgent:'open sub-agent →',
    before:'before', after:'after', text:'text', input:'input', output:'output', errorTag:' · ERROR',
    truncated:'… (truncated)', question:'question', chosen:'✓ chosen', userDecision:'user decision',
    sessionPrefix:'Session', summaryTitle:'Session summary',
    overviewHint:'Select a step in the timeline to see its I/O. <b>Sub-agent</b> cards open their call graph and the detail of each sub-call. The <b>segments to review</b> are in a separate report.',
    composition:'composition', skillsUsed:'skills used', subAgentsByTokens:'sub-agents by tokens',
    tokensPerTurn:'tokens per turn · what each one ran', tokensPerTurnTip:'Log tokens are reported per LLM turn, not per individual tool.',
    chToolsCount:'tools per turn (use count)', chToolsTokens:'tokens by tool (share)',
    chTokensTurn:'tokens per turn (fresh: input+output)',
    chToolsTokensTip:'Approximate: the log reports tokens per turn, not per tool. They are split proportionally across the tools each turn ran.',
    chTokensTurnTip:'Fresh tokens generated each turn (input+output); excludes re-reading cached context.',
    axisTurn:'turn', catSub:'subagent', catSkill:'skill', catOtros:'other', catAll:'all', catReason:'reasoning', turnActivity:'per-turn activity',
    turn:'Turn', dismiss:'dismiss', findingsBadge:'⚑ Segments to review ({0})', segment:'segment',
    role:{user:'user',assistant:'assistant',system:'system',tool:'tool'},
    kind:{message:'message',thinking:'reasoning',llm_call:'LLM call',tool_call:'tool',agent:'sub-agent',skill:'skill',decision:'decision',event:'event'},
    cat:{friccion:'friction',eficiencia:'efficiency',latencia:'latency',calidad:'quality'},
    sev:{alta:'high',media:'medium',baja:'low'},
    via:{'skill-tool':'Skill tool','command':'slash command','bash':'script (Bash)'},
  },
};
function resolveLang(){
  try{ const s=localStorage.getItem('aiEmosLang'); if(s==='es'||s==='en') return s; }catch(e){}
  if(window.__lang==='es'||window.__lang==='en') return window.__lang;
  return String(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
}
let lang = resolveLang();
const t = (k,...a)=>{ let s=(I18N[lang]&&I18N[lang][k]); if(s==null) s=I18N.es[k]; if(s==null) s=k; if(typeof s!=='string') return s; a.forEach((v,i)=>{s=s.split('{'+i+'}').join(v);}); return s; };
const kindLabel = k => (I18N[lang].kind[k]||I18N.es.kind[k]||k);
const catLabel = c => (I18N[lang].cat[c]||I18N.es.cat[c]||c);
const sevLabel = s => (I18N[lang].sev[s]||I18N.es.sev[s]||s);
function renderLangToggle(){
  const el=document.getElementById('langtoggle'); if(!el) return;
  el.innerHTML=['es','en'].map(l=>`<button data-l="${l}" class="${l===lang?'on':''}">${l.toUpperCase()}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>setLang(b.dataset.l));
}

const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n||0);
const ms = n => n==null?'':(n>=60000?(n/60000).toFixed(1)+'m':n>=1000?(n/1000).toFixed(1)+'s':n+'ms');
// fechas en HORA LOCAL del PC (los timestamps llegan en ISO/UTC). new Date(iso)
// los reinterpreta a la zona local, así la hora mostrada coincide con la del equipo.
const pad2 = n => String(n).padStart(2,'0');
const lt = iso => { if(!iso) return ''; const d=new Date(iso); return isNaN(d)?'':pad2(d.getHours())+':'+pad2(d.getMinutes())+':'+pad2(d.getSeconds()); };
const ldt = iso => { if(!iso) return ''; const d=new Date(iso); return isNaN(d)?'':d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+lt(iso); };
const ldtm = iso => { const s=ldt(iso); return s?s.slice(0,16):''; };
const role2 = r => (I18N[lang].role[r]||I18N.es.role[r]||'');
// tokens FRESCOS de un paso (input+output); el `total` incluye cacheRead re-leído
// por turno y dispararía la cifra. Los sub-agentes muestran su rollup (totalTokens).
const ftok = tk => tk ? ((tk.input||0)+(tk.output||0)) : 0;
const stepTok = s => (s.kind==='agent'&&s.agent) ? (s.agent.totalTokens||0) : ftok(s.tokens);
const kc = k => css('--'+k) || css('--event');
const short = s => { s=String(s||''); return s.length>16?s.slice(0,15)+'…':s; };

// ---- registro de pasos (uid jerárquico) ----
const REG = new Map();
function indexSteps(steps, prefix=''){ (steps||[]).forEach((s,i)=>{ const uid=prefix+i; s._uid=uid; REG.set(uid,s); if(s.kind==='agent'&&s.agent&&s.agent.steps) indexSteps(s.agent.steps, uid+'.'); }); }

// ---- Markdown ligero ----
function md(src){
  if(src==null) return '';
  let s=esc(String(src)); const fences=[];
  s=s.replace(/```([\w-]*)\n?([\s\S]*?)```/g,(m,lang,code)=>{fences.push(`<pre class="code">${code.replace(/\n+$/,'')}</pre>`);return ` F${fences.length-1} `;});
  const lines=s.split('\n'),out=[]; let para=[],list=null;
  const fp=()=>{if(para.length){out.push('<p>'+para.join('<br>')+'</p>');para=[];}};
  const fl=()=>{if(list){out.push(`<${list.t}>`+list.items.map(i=>'<li>'+i+'</li>').join('')+`</${list.t}>`);list=null;}};
  for(let ln of lines){
    if(/^ F\d+ $/.test(ln.trim())){fp();fl();out.push(ln.trim());continue;}
    let m;
    if((m=ln.match(/^(#{1,6})\s+(.*)$/))){fp();fl();const n=m[1].length;out.push(`<h${n}>${inline(m[2])}</h${n}>`);continue;}
    if(/^\s*&gt;\s?/.test(ln)){fp();fl();out.push(`<blockquote>${inline(ln.replace(/^\s*&gt;\s?/,''))}</blockquote>`);continue;}
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(ln)){fp();fl();out.push('<hr>');continue;}
    if((m=ln.match(/^\s*[-*+]\s+(.*)$/))){fp();if(!list||list.t!=='ul'){fl();list={t:'ul',items:[]};}list.items.push(inline(m[1]));continue;}
    if((m=ln.match(/^\s*\d+\.\s+(.*)$/))){fp();if(!list||list.t!=='ol'){fl();list={t:'ol',items:[]};}list.items.push(inline(m[1]));continue;}
    if(ln.trim()===''){fp();fl();continue;}
    para.push(inline(ln));
  }
  fp();fl();
  return out.join('\n').replace(/ F(\d+) /g,(m,i)=>fences[+i]);
}
function inline(s){ return s.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\b_([^_]+)_\b/g,'<em>$1</em>').replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>'); }

// ---- render input/output ----
const CODE_KEYS=new Set(['command','code','content','file_text','sql','query','patch','script','body']);
const MD_KEYS=new Set(['prompt','description','instructions','text','message','question']);
function diffBlock(o,n){let h='<div class="diff">';if(o!=null){h+=`<div class="hd">${t('before')}</div>`;String(o).split('\n').forEach(l=>h+=`<div class="dl del">- ${esc(l)}</div>`);}if(n!=null){h+=`<div class="hd">${t('after')}</div>`;String(n).split('\n').forEach(l=>h+=`<div class="dl add">+ ${esc(l)}</div>`);}return h+'</div>';}
function renderObj(obj){
  if(Array.isArray(obj)) return `<pre class="code">${esc(JSON.stringify(obj,null,2))}</pre>`;
  let h='';
  for(const k of Object.keys(obj)){
    const v=obj[k]; if(v==null) continue; if(k==='old_string'||k==='new_string') continue;
    if(typeof v==='object') h+=`<div class="kv"><span class="kk">${esc(k)}</span><div class="kvv">${renderObj(v)}</div></div>`;
    else if(CODE_KEYS.has(k)) h+=`<div class="kv"><span class="kk">${esc(k)}</span><div class="kvv"><pre class="code">${esc(String(v))}</pre></div></div>`;
    else if(MD_KEYS.has(k)) h+=`<div class="kv"><span class="kk">${esc(k)}</span><div class="kvv mdwrap">${md(v)}</div></div>`;
    else h+=`<div class="kv"><span class="kk">${esc(k)}</span><span class="kvs">${esc(String(v))}</span></div>`;
  }
  if(obj.old_string!=null||obj.new_string!=null) h+=diffBlock(obj.old_string,obj.new_string);
  return h;
}
function renderVal(v){ if(v==null)return''; if(typeof v==='object')return renderObj(v); const s=String(v).trim(); if((s.startsWith('{')&&s.endsWith('}'))||(s.startsWith('[')&&s.endsWith(']'))){try{return renderObj(JSON.parse(s));}catch(e){}} return `<div class="mdwrap">${md(v)}</div>`; }
function field(l,inner,err){return `<div class="iofield ${err?'err':''}"><span class="k">${esc(l)}</span>${inner}</div>`;}
function ioBlock(s){let h='';if(s.text)h+=field(t('text'),`<div class="mdwrap">${md(s.text)}</div>`);if(s.io){if(s.io.input!=null)h+=field(t('input'),renderVal(s.io.input));if(s.io.output!=null)h+=field(t('output')+(s.io.isError?t('errorTag'):''),renderVal(s.io.output),s.io.isError);if(s.io.truncated)h+=`<div class="truncated">${t('truncated')}</div>`;}return h;}
function decisionBlock(d){if(!d)return'';let h=field(t('question'),`<div class="mdwrap">${md(d.prompt||'')}</div>`);const chosen=(d.chosen||[]).map(String);let opts='';(d.options||[]).forEach(o=>{const c=chosen.some(x=>x===o.label||(o.label&&x.includes(o.label)));opts+=`<div class="opt ${c?'chosen':''}"><div class="lab">${esc(o.label)}${c?` <span class="chosen-tag">${t('chosen')}</span>`:''}</div>${o.description?`<div class="desc">${esc(o.description)}</div>`:''}</div>`;});if(opts)h+=opts;if(chosen.length)h+=field(t('userDecision'),`<div class="mdwrap">${md(chosen.join('\n\n— '))}</div>`);return h;}
function statsLine(st){const p=[];if(st.toolUseCount)p.push(st.toolUseCount+' tools');if(st.readCount)p.push(st.readCount+' reads');if(st.bashCount)p.push(st.bashCount+' bash');if(st.editFileCount)p.push(st.editFileCount+' edits');if(st.linesAdded||st.linesRemoved)p.push(`+${st.linesAdded||0}/-${st.linesRemoved||0}`);return p.join(' · ');}

// ---- gráficos del overview: herramientas / tokens por turno ----
const CHART_PAL=['#6ea8fe','#c9a0ff','#6ee7ff','#ffb86b','#ff7eb6','#7ee787','#f2cc60','#ff9492','#a5d6ff','#d2a8ff'];
let TOOL_SEL='@all';   // herramienta aislada en el chart "por turno" ('@all' = todas)
let TOOLDATA=null;     // {turns,keys,colorOf} cacheado para re-render del chart sin recomputar
function catKeyOf(s){
  if(s.kind==='tool_call') return (String(s.label||'').replace(/^tool:/,''))||'tool';
  if(s.kind==='agent') return '@sub';
  if(s.kind==='skill') return '@skill';
  return null;
}
function toolCatLabel(k){ return k==='@sub'?t('catSub'):k==='@skill'?t('catSkill'):k==='@otros'?t('catOtros'):k==='@reason'?t('catReason'):k; }
// agrupa los steps top-level por turno: tokens frescos (input+output) + conteo por categoría
function turnsFromSteps(){
  const map=new Map();
  for(const s of (DATA.steps||[])){
    if(s.turn==null) continue;
    let e=map.get(s.turn); if(!e){ e={turn:s.turn,fresh:0,cats:{}}; map.set(s.turn,e); }
    // el parser adjunta tokens a UN solo step por turno (ver core/render.mjs
    // collectTurns), así que el max == ese único valor; el guard evita contar 0s.
    if(s.tokens){ const fr=(s.tokens.input||0)+(s.tokens.output||0); if(fr>e.fresh) e.fresh=fr; }
    const k=catKeyOf(s); if(k) e.cats[k]=(e.cats[k]||0)+1;
  }
  return [...map.values()].sort((a,b)=>a.turn-b.turn);
}
// categorías ordenadas por nº de usos; lo que sobra del top se agrupa en '@otros'
function rankCats(turns, MAX=9){
  const tot={}; turns.forEach(e=>Object.entries(e.cats).forEach(([k,n])=>tot[k]=(tot[k]||0)+n));
  let keys=Object.keys(tot).sort((a,b)=>tot[b]-tot[a]); let overflow=new Set();
  if(keys.length>MAX){ overflow=new Set(keys.slice(MAX-1)); keys=keys.slice(0,MAX-1).concat(['@otros']); }
  const colorOf={}; let ci=0;
  keys.forEach(k=>{ colorOf[k]= k==='@sub'?css('--agent'): k==='@skill'?css('--skill'): k==='@otros'?css('--event'): CHART_PAL[ci++ % CHART_PAL.length]; });
  const norm=turns.map(e=>{ const cats={}; Object.entries(e.cats).forEach(([k,n])=>{ const kk=overflow.has(k)?'@otros':k; cats[kk]=(cats[kk]||0)+n; }); return {turn:e.turn,fresh:e.fresh,cats}; });
  return {keys,colorOf,turns:norm};
}
// ticks "nice": [0..top] en ~`target` pasos redondos (20k, 50, 0.2, …)
function niceTicks(max, target, intStep){
  if(!(max>0)) return [0,1];
  const raw=max/(target||5), mag=Math.pow(10,Math.floor(Math.log10(raw))), nrm=raw/mag;
  let step=(nrm<1.5?1:nrm<3?2:nrm<7?5:10)*mag;
  if(intStep) step=Math.max(1,Math.round(step)); // datos enteros (conteos): nada de pasos 0.5
  const top=Math.ceil(max/step)*step, out=[];
  for(let i=0; i*step<=top+step*1e-6; i++) out.push(+(i*step).toFixed(10)); // i*step + toFixed: sin drift float
  return out;
}
// índices equiespaciados sobre n puntos (incluye extremos), hasta `maxT` rótulos
function tickIdx(n, maxT){
  if(n<=1) return [0]; maxT=maxT||8;
  const want=n<=maxT?n:maxT, out=[];
  for(let i=0;i<want;i++) out.push(Math.round(i*(n-1)/(want-1)));
  return [...new Set(out)];
}
// gráfico de líneas (1 o N series) con ejes, grilla punteada "nice" y rótulos de turno
function lineChart(turns, keys, colorOf, getY, fmtY){
  const w=560,h=156,padL=46,padR=14,padT=10,padB=26, n=turns.length; if(!n) return '';
  const pw=w-padL-padR, ph=h-padT-padB, FS=8;
  let mx=0, intY=true; turns.forEach(e=>keys.forEach(k=>{ const v=getY(e,k); if(v>mx) mx=v; if(!Number.isInteger(v)) intY=false; }));
  const yt=niceTicks(mx,5,intY), top=yt[yt.length-1]||1;
  const X=i=> n===1? padL+pw/2 : padL+i*pw/(n-1);
  const Y=v=> (padT+ph)-(v/top)*ph;
  const ax='var(--line)', lb='var(--mut)';
  const grid=yt.map(v=>`<line x1="${padL}" y1="${Y(v).toFixed(1)}" x2="${w-padR}" y2="${Y(v).toFixed(1)}" stroke="${ax}" stroke-dasharray="2 3" opacity=".5"/><text x="${padL-5}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" fill="${lb}" font-size="${FS}">${esc(fmtY(v))}</text>`).join('');
  const yA=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+ph}" stroke="${ax}"/>`;
  const xA=`<line x1="${padL}" y1="${padT+ph}" x2="${w-padR}" y2="${padT+ph}" stroke="${ax}"/>`;
  const series=keys.map(k=>{ const pts=turns.map((e,i)=>X(i).toFixed(1)+','+Y(getY(e,k)).toFixed(1)).join(' '); return `<polyline fill="none" stroke="${colorOf[k]}" stroke-width="1.5" points="${pts}"/>`; }).join('');
  const xl=tickIdx(n,8).map(i=>{ const x=X(i), anc=i===0?'start':i===n-1?'end':'middle';
    return `<line x1="${x.toFixed(1)}" y1="${(padT+ph).toFixed(1)}" x2="${x.toFixed(1)}" y2="${(padT+ph+3).toFixed(1)}" stroke="${ax}"/><text x="${x.toFixed(1)}" y="${h-9}" text-anchor="${anc}" fill="${lb}" font-size="${FS}">${esc(String(turns[i].turn))}</text>`; }).join('');
  const cap=`<text x="${(padL+pw/2).toFixed(1)}" y="${h-1}" text-anchor="middle" fill="${lb}" font-size="${FS}" opacity=".65">${t('axisTurn')}</text>`;
  return `<svg class="chartsvg" viewBox="0 0 ${w} ${h}">${grid}${yA}${xA}${series}${xl}${cap}</svg>`;
}
// tokens por categoría: reparto proporcional del coste fresco de cada turno.
// Los turnos SIN herramienta (razonamiento puro) van a '@reason' para que la
// torta sume el total de tokens frescos y cuadre con el chart de tokens/turno.
function tokensByCat(turns, keys){
  const tok={}; keys.forEach(k=>tok[k]=0); tok['@reason']=0;
  turns.forEach(e=>{ if(!e.fresh) return; const tc=Object.values(e.cats).reduce((a,b)=>a+b,0);
    if(!tc){ tok['@reason']+=e.fresh; return; }
    Object.entries(e.cats).forEach(([k,n])=>{ tok[k]=(tok[k]||0)+e.fresh*n/tc; }); });
  return tok;
}
function pieChart(keys, colorOf, vals){
  const pos=keys.filter(k=>(vals[k]||0)>0); const total=pos.reduce((a,k)=>a+vals[k],0); if(!total) return '';
  const cx=70,cy=70,r=60;
  if(pos.length===1) return `<svg viewBox="0 0 140 140" class="pie"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${colorOf[pos[0]]}"><title>${esc(toolCatLabel(pos[0]))}: 100%</title></circle></svg>`;
  let ang=-Math.PI/2; const segs=pos.map(k=>{ const v=vals[k]; const a2=ang+2*Math.PI*v/total; const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2); const large=(a2-ang)>Math.PI?1:0; const p=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${colorOf[k]}"><title>${esc(toolCatLabel(k))}: ${fmt(Math.round(v))} (${(100*v/total).toFixed(0)}%)</title></path>`; ang=a2; return p; }).join('');
  return `<svg viewBox="0 0 140 140" class="pie">${segs}</svg>`;
}
function chartLegend(keys, colorOf, labelFn){
  return `<div class="chartlegend">`+keys.map(k=>`<span class="lg"><span class="kdot" style="background:${colorOf[k]}"></span>${esc(labelFn?labelFn(k):toolCatLabel(k))}</span>`).join('')+`</div>`;
}
// cuerpo del chart "herramientas por turno": líneas (todas o la aislada) + leyenda
// clicable ('todos' + una por herramienta). Usa TOOLDATA/TOOL_SEL (re-renderizable).
function toolsChartBody(){
  if(!TOOLDATA) return '';
  const {turns,keys,colorOf}=TOOLDATA;
  const shown = TOOL_SEL==='@all' ? keys : [TOOL_SEL];
  const svg = lineChart(turns, shown, colorOf, (e,k)=>e.cats[k]||0, v=>String(Math.round(v)));
  const item=(key,label,color)=>`<span class="lgsel${TOOL_SEL===key?' on':''}" data-cat="${esc(key)}">${color?`<span class="kdot" style="background:${color}"></span>`:'<span class="kdot kall"></span>'}${esc(label)}</span>`;
  const leg = `<div class="chartlegend">`+item('@all',t('catAll'))+keys.map(k=>item(k,toolCatLabel(k),colorOf[k])).join('')+`</div>`;
  return svg+leg;
}
function wireToolsChart(){
  const box=document.getElementById('chart-tools'); if(!box) return;
  box.querySelectorAll('.lgsel').forEach(el=>el.onclick=()=>{ TOOL_SEL=el.dataset.cat; box.innerHTML=toolsChartBody(); wireToolsChart(); });
}
function turnCharts(){
  const raw=turnsFromSteps(); if(!raw.length) return '';
  const {keys,colorOf,turns}=rankCats(raw);
  TOOLDATA={turns,keys,colorOf};
  if(TOOL_SEL!=='@all' && !keys.includes(TOOL_SEL)) TOOL_SEL='@all'; // la herramienta aislada ya no existe
  const qm=tip=>`<span class="qm" title="${esc(tip)}">?</span>`;
  const c1=keys.length?`<div class="chartcard"><div class="charttitle">${t('chToolsCount')}</div><div id="chart-tools">${toolsChartBody()}</div></div>`:'';
  const tok=tokensByCat(turns,keys);
  const pieKeys = tok['@reason']>0 ? keys.concat(['@reason']) : keys;
  const pieCol = tok['@reason']>0 ? Object.assign({}, colorOf, {'@reason':css('--thinking')}) : colorOf;
  const totTok=pieKeys.reduce((a,k)=>a+(tok[k]||0),0);
  const c2=(pieKeys.length&&totTok>0)?`<div class="chartcard"><div class="charttitle">${t('chToolsTokens')} ${qm(t('chToolsTokensTip'))}</div><div class="pierow">${pieChart(pieKeys,pieCol,tok)}${chartLegend(pieKeys,pieCol,k=>toolCatLabel(k)+' · '+(100*(tok[k]||0)/totTok).toFixed(0)+'%')}</div></div>`:'';
  const c3=`<div class="chartcard"><div class="charttitle">${t('chTokensTurn')} ${qm(t('chTokensTurnTip'))}</div>${lineChart(turns,['@tok'],{'@tok':css('--acc')},(e)=>e.fresh||0,v=>fmt(Math.round(v)))}</div>`;
  // tools-por-turno (c1) y tokens-por-turno (c3) van uno bajo el otro y con el
  // mismo eje X (turnos) para comparar directo qué herramienta gastó qué tokens;
  // el pie de reparto (c2) queda al final.
  return c1+c3+c2;
}

// ---- vista por defecto del panel derecho: overview ----
function defaultDetail(){
  SELECTED=null; GRAPH_SEL=null; OPEN_SUBS.clear();
  document.getElementById('right').classList.remove('right-split');
  document.querySelectorAll('.tlcard.active').forEach(e=>e.classList.remove('active'));
  const s=DATA.summary||{}; const sc=s.stepCounts||{};
  const byKind=Object.keys(sc).map(k=>`<span class="lg"><span class="kdot" style="background:${kc(k)}"></span>${kindLabel(k)}: ${sc[k]}</span>`).join('');
  const ag=(s.agents||[]).slice().sort((a,b)=>b.tokens-a.tokens).slice(0,8)
    .map(a=>`<div class="kv"><span class="kk">${esc(a.name||'?')}</span><span class="kvs">${fmt(a.tokens)} tok · ${a.durationMs?ms(a.durationMs):'?'}${a.stats&&a.stats.toolUseCount?' · '+a.stats.toolUseCount+' tools':''}</span></div>`).join('');
  const sk=(s.skills||[]).map(k=>`<div class="kv"><span class="kk">${esc(k.name)}</span><span class="kvs">${k.count}×${(k.via||[]).length?' · '+k.via.map(v=>(I18N[lang].via[v]||I18N.es.via[v]||v)).join(' / '):''}</span></div>`).join('');
  const charts=turnCharts();
  document.getElementById('detail').innerHTML=
    `<div class="d-h"><span class="d-ttl">${esc(DATA.title||t('summaryTitle'))}</span></div>
     <div class="d-meta">${t('overviewHint')}</div>
     <div class="d-sub">${t('composition')}</div><div class="legend" style="padding:0">${byKind}</div>
     ${sk?`<div class="d-sub">${t('skillsUsed')}</div>${sk}`:''}
     ${ag?`<div class="d-sub">${t('subAgentsByTokens')}</div>${ag}`:''}
     ${charts?`<div class="d-sub">${t('turnActivity')}</div>${charts}`:''}`;
  wireToolsChart();
}

document.getElementById('q').oninput=e=>{ const q=e.target.value.toLowerCase();
  document.querySelectorAll('#timeline .tlitem').forEach(it=>{ it.style.display=(!q||it.textContent.toLowerCase().includes(q))?'':'none'; });
};

function renderAll(){
  // preserva la selección y el scroll de la lista al re-renderizar (modo en vivo)
  const keep=SELECTED;
  // y el estado del detalle: nodo resaltado del grafo + sub-llamadas abiertas
  const gsel=GRAPH_SEL, opens=new Set(OPEN_SUBS);
  const left=document.getElementById('left'); const leftScroll=left?left.scrollTop:0;
  const right=document.getElementById('right'); const rightScroll=right?right.scrollTop:0;
  REG.clear(); indexSteps(DATA.steps||[]); header(); legend(); timeline();
  if(keep && REG.has(keep)){
    select(keep); // resetea GRAPH_SEL/OPEN_SUBS; los restauramos desde las copias
    GRAPH_SEL=gsel; OPEN_SUBS.clear(); opens.forEach(i=>OPEN_SUBS.add(i)); applyDetailState();
    if(right) right.scrollTop=rightScroll;
  }
  else defaultDetail();
  if(left) left.scrollTop=leftScroll;
}
document.documentElement.lang=lang;
renderLangToggle();
applyI18n();

// ---- modo en vivo: reaplica la traza fresca sin recargar la página ----
// VS Code envía postMessage({type:'data',trace}); el servidor expone una URL
// SSE en window.__aiEmosLive. En el HTML guardado/standalone nada de esto
// existe, así que el bloque es inerte.
window.__aiEmosApply = function(d){ if(d){ DATA = d; renderAll(); } };

// ---- feed en vivo: toasts de los tramos a revisar que APARECEN en vivo ----
// El servidor (SSE) y la extensión (postMessage) emiten {findings,total} aparte
// de la traza completa, para avisar sin re-renderizar todo el timeline.
const SEV_C = { alta:'--alta', media:'--media', baja:'--baja' };
// Mapea un finding a la card del timeline (best-effort; solo nivel superior).
function lfUid(f){ if(f.path) return null; const s=(DATA.steps||[]).find(x=>x.index===f.index); return s?s._uid:null; }
function pushFinding(f){
  const feed=document.getElementById('livefeed'); if(!feed||!f) return;
  const el=document.createElement('div'); el.className='lftoast';
  el.style.setProperty('--c', css(SEV_C[f.severity]||'--media'));
  el.innerHTML=`<div class="lfh"><span class="lfcat">${esc(f.category?catLabel(f.category):t('segment'))} · ${esc(f.severity?sevLabel(f.severity):'')}</span><span class="lfx" title="${t('dismiss')}">×</span></div>`+
    `<div class="lfwhy">${esc(f.why||f.label||'')}</div>`;
  const uid=lfUid(f);
  if(uid){ el.onclick=ev=>{ if(!ev.target.classList.contains('lfx')) select(uid); }; }
  el.querySelector('.lfx').onclick=ev=>{ ev.stopPropagation(); el.remove(); };
  feed.appendChild(el);
  while(feed.children.length>6) feed.removeChild(feed.firstChild);
  setTimeout(()=>{ el.style.transition='opacity .4s'; el.style.opacity='0'; setTimeout(()=>el.remove(),400); }, 15000);
}
function applyFindingEvent(p){
  if(!p) return;
  (p.findings||[]).forEach(pushFinding);
  const b=document.getElementById('__avfind'); // badge del botón de la extensión
  if(b&&p.total!=null) b.textContent=t('findingsBadge', p.total);
}

(function(){
  window.addEventListener('message', e => {
    const m = e && e.data; if (!m) return;
    if (m.type === 'data' && m.trace) window.__aiEmosApply(m.trace);
    else if (m.type === 'finding') applyFindingEvent(m);
  });
  if (window.__aiEmosLive) {
    try {
      const es = new EventSource(window.__aiEmosLive);
      es.onmessage = ev => { try { window.__aiEmosApply(JSON.parse(ev.data)); } catch (e) {} };
      es.addEventListener('finding', ev => { try { applyFindingEvent(JSON.parse(ev.data)); } catch (e) {} });
    } catch (e) {}
  }
})();
</script>
