<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ai-emos — sesiones</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--line:#2a2f3a;--tx:#e6e8ee;--mut:#9aa3b2;--acc:#6ea8fe;--bar:#3a64c0;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  header{padding:16px 22px;border-bottom:1px solid var(--line);background:var(--panel);}
  h1{font-size:16px;margin:0;} .sub{color:var(--mut);font-size:12px;margin-top:3px;}
  .stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 10px;}
  .stat b{font-size:15px;} .stat span{color:var(--mut);font-size:11px;display:block;}
  .bar{display:flex;align-items:center;gap:12px;padding:12px 22px;flex-wrap:wrap;}
  .bar input{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:7px 10px;}
  .bar label{color:var(--mut);font-size:12px;}
  select,button{background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:6px 10px;cursor:pointer;}
  button:hover,select:hover{border-color:var(--acc);}
  button:disabled{opacity:.4;cursor:default;}
  button.primary{background:var(--acc);color:#0b0d11;border-color:var(--acc);font-weight:600;}
  button#analyze.stale{background:#ffb86b;border-color:#ffb86b;}
  .langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .langtoggle button{border:0;border-radius:0;padding:5px 9px;background:var(--panel2);color:var(--mut);font-size:11px;}
  .langtoggle button.on{background:var(--acc);color:#0b0d11;font-weight:600;}
  main{padding:0 22px 28px;}
  section{margin-top:8px;}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:18px 0 8px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  th{color:var(--mut);font-weight:600;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  tr.row{cursor:pointer;} tr.row:hover td{background:var(--panel2);}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:11px;color:var(--mut);}
  .ttl{font-weight:600;}
  .pager{display:flex;align-items:center;gap:12px;padding:14px 0;color:var(--mut);font-size:12px;}
  .empty{color:var(--mut);font-style:italic;padding:18px 0;}
  .hint{color:var(--mut);font-size:12px;}
  .barwrap{background:var(--panel2);border-radius:4px;overflow:hidden;} .bar-fill{height:8px;background:var(--bar);border-radius:4px;}
  #agg{display:none;border:1px solid var(--line);border-radius:10px;padding:4px 14px 14px;background:var(--panel);}
  #agg.on{display:block;}
  .agg-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .note{color:var(--mut);font-size:12px;}
  /* drill-down: agente en el tiempo */
  tr.clickable{cursor:pointer;} tr.clickable:hover td{background:var(--panel2);}
  tr.selrow td{background:var(--panel2);box-shadow:inset 2px 0 0 var(--acc);}
  .axis-note{color:var(--mut);font-size:11px;margin:2px 0 10px;}
  .adbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .adbar .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .adbar .seg button{border:0;border-radius:0;padding:5px 12px;}
  .adbar .seg button.on{background:var(--acc);color:#0b0d11;font-weight:600;}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .chart{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
  .charth{font-size:12px;color:var(--mut);margin-bottom:6px;}
  .spark{display:block;width:100%;height:auto;}
</style>
</head>
<body>
<header>
  <h1 id="h1">Sesiones</h1>
  <div class="sub" id="sub"></div>
  <div class="stats" id="stats"></div>
</header>
<div class="bar">
  <input type="search" id="q" placeholder="filtrar por título / id / fuente…" />
  <label id="lblPageSize">por página</label>
  <select id="pagesize"><option>10</option><option selected>50</option><option>100</option></select>
  <button id="analyze" class="primary">📊 Analizar agregados</button>
  <div class="langtoggle" id="langtoggle"></div>
</div>
<main>
  <section>
    <table>
      <thead><tr><th id="thTitle">título</th><th id="thSource">fuente</th><th id="thEnded">fin</th><th class="num" id="thTokens">tokens</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="pager">
      <button id="prev">◀ anterior</button><span id="pginfo"></span><button id="next">siguiente ▶</button>
      <span class="hint" id="hint" style="margin-left:auto">clic en una sesión → abre su timeline EN VIVO · la tabla se actualiza sola</span>
    </div>
  </section>

  <section id="agg"><h2 id="agg-title">Agregados</h2>
    <div id="agentDetail" style="display:none;margin-bottom:6px;border-bottom:1px solid var(--line);padding-bottom:14px">
      <div class="adbar">
        <b id="adTitle">Agente</b><span class="note" id="adSub"></span>
        <div class="seg" style="margin-left:auto"><button id="ad7" class="on">últimos 7 días</button><button id="ad30">últimos 30 días</button></div>
        <button id="adOpen" class="primary">↗ abrir en ventana</button>
      </div>
      <div class="charts" id="adCharts"></div>
    </div>
    <div class="agg-grid">
      <div><h2 id="h2ByAgent"></h2><div id="byAgent"></div></div>
      <div><h2 id="h2BySkill"></h2><div id="bySkill"></div></div>
    </div>
  </section>
</main>

<script id="report-data" type="application/json">{"sessions":[]}</script>
<script>
// ---- i18n (ES por defecto; auto-detecta y permite toggle ES|EN) ----
const I18N = {
  es: {
    docTitle:'ai-emos — sesiones', h1:'Sesiones', searchPh:'filtrar por título / id / fuente…',
    perPage:'por página', analyze:'📊 Analizar agregados', reanalyze:'📊 Re-analizar agregados', reanalyzeStale:'🔄 Re-analizar (datos nuevos)',
    analyzeTitle:'Calcula tokens por agente/skill sobre las sesiones del filtro (parsea cada una)',
    analyzing:'Analizando {0}…', aggTitle:'Agregados',
    byAgent:'Por agente (tokens)', byAgentHint:'clic → en el tiempo', bySkill:'Por skill (usos)',
    agent:'Agente', agentDot:'Agente · {0}', skillDot:'Skill · {0}',
    appearDays:'{0} apariciones · {1} días con datos', close:'cerrar',
    win7:'últimos 7 días', win30:'últimos 30 días',
    winTip:'Cada punto = un día (suma de las sesiones de esa jornada), en la ventana elegida.',
    openWindow:'↗ abrir en ventana', openWindowTitle:'Abre el dashboard de uso en una pestaña nueva',
    bySkillHint:'clic → en el tiempo', chUses:'usos', noSkillData:'sin datos para este skill',
    pickEntityHint:'Selecciona un agente o skill abajo para ver su gráfico.',
    thTitle:'título', thSource:'fuente', thEnded:'fin', thTokens:'tokens',
    noSessions:'Sin sesiones.', prev:'◀ anterior', next:'siguiente ▶',
    hint:'clic en una sesión → abre su timeline EN VIVO · la tabla se actualiza sola',
    sessions:'sesiones', filter:'(filtro)', tokensRaw:'tokens (bruto)',
    pginfo:'{0}–{1} de {2}', pginfoEmpty:'0 de 0', subCount:'{0} sesiones{1}', subInFilter:' · {0} en el filtro',
    noAgentData:'sin datos para este agente',
    chTokens:'tokens', chError:'% error', chDuration:'duración', chDurationDay:'duración (total/día)', chRetries:'reintentos',
    days:'días', daysUnit:'sesiones', colAgent:'agente', colCalls:'llamadas', colTokens:'tokens',
    colSkill:'skill', colUses:'usos',
    aggSummary:'Agregados · {0} sesiones · {1} tokens · {2} a revisar',
  },
  en: {
    docTitle:'ai-emos — sessions', h1:'Sessions', searchPh:'filter by title / id / source…',
    perPage:'per page', analyze:'📊 Analyze aggregates', reanalyze:'📊 Re-analyze aggregates', reanalyzeStale:'🔄 Re-analyze (new data)',
    analyzeTitle:'Computes tokens per agent/skill over the filtered sessions (parses each one)',
    analyzing:'Analyzing {0}…', aggTitle:'Aggregates',
    byAgent:'By agent (tokens)', byAgentHint:'click → over time', bySkill:'By skill (uses)',
    agent:'Agent', agentDot:'Agent · {0}', skillDot:'Skill · {0}',
    appearDays:'{0} appearances · {1} days with data', close:'close',
    win7:'last 7 days', win30:'last 30 days',
    winTip:'Each point = one day (sum of that day’s sessions), within the chosen window.',
    openWindow:'↗ open in window', openWindowTitle:'Opens the usage dashboard in a new tab',
    bySkillHint:'click → over time', chUses:'uses', noSkillData:'no data for this skill',
    pickEntityHint:'Select an agent or skill below to see its chart.',
    thTitle:'title', thSource:'source', thEnded:'ended', thTokens:'tokens',
    noSessions:'No sessions.', prev:'◀ prev', next:'next ▶',
    hint:'click a session → opens its LIVE timeline · the table updates itself',
    sessions:'sessions', filter:'(filter)', tokensRaw:'tokens (raw)',
    pginfo:'{0}–{1} of {2}', pginfoEmpty:'0 of 0', subCount:'{0} sessions{1}', subInFilter:' · {0} in filter',
    noAgentData:'no data for this agent',
    chTokens:'tokens', chError:'% error', chDuration:'duration', chDurationDay:'duration (total/day)', chRetries:'retries',
    days:'days', daysUnit:'sessions', colAgent:'agent', colCalls:'calls', colTokens:'tokens',
    colSkill:'skill', colUses:'uses',
    aggSummary:'Aggregates · {0} sessions · {1} tokens · {2} to review',
  },
};
function resolveLang(){
  try{ const s=localStorage.getItem('aiEmosLang'); if(s==='es'||s==='en') return s; }catch(e){}
  if(window.__lang==='es'||window.__lang==='en') return window.__lang;
  return String(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
}
let lang = resolveLang();
const t = (k,...a)=>{ let s=(I18N[lang]&&I18N[lang][k])||I18N.es[k]||k; a.forEach((v,i)=>{s=s.split('{'+i+'}').join(v);}); return s; };
function renderLangToggle(){
  const el=document.getElementById('langtoggle'); if(!el) return;
  el.innerHTML=['es','en'].map(l=>`<button data-l="${l}" class="${l===lang?'on':''}">${l.toUpperCase()}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>setLang(b.dataset.l));
}
function setLang(l){ if(l!==lang){ lang=l; try{localStorage.setItem('aiEmosLang',l);}catch(e){} } document.documentElement.lang=l; applyI18n(); renderLangToggle(); }
function applyI18n(){
  document.title=t('docTitle');
  document.getElementById('h1').textContent=t('h1');
  document.getElementById('q').placeholder=t('searchPh');
  document.getElementById('lblPageSize').textContent=t('perPage');
  const ab=document.getElementById('analyze');
  ab.textContent= aggD ? t('reanalyze') : t('analyze'); ab.title=t('analyzeTitle');
  document.getElementById('h2ByAgent').innerHTML=`${t('byAgent')} · <span style="text-transform:none;font-weight:400">${t('byAgentHint')}</span>`;
  document.getElementById('h2BySkill').innerHTML=`${t('bySkill')} · <span style="text-transform:none;font-weight:400">${t('bySkillHint')}</span>`;
  const winBtns=[['ad7','win7'],['ad30','win30']];
  winBtns.forEach(([id,k])=>{ const b=document.getElementById(id); b.textContent=t(k); b.title=t('winTip'); });
  const ao=document.getElementById('adOpen'); ao.textContent=t('openWindow'); ao.title=t('openWindowTitle');
  document.getElementById('thTitle').textContent=t('thTitle');
  document.getElementById('thSource').textContent=t('thSource');
  document.getElementById('thEnded').textContent=t('thEnded');
  document.getElementById('thTokens').textContent=t('thTokens');
  document.getElementById('prev').textContent=t('prev');
  document.getElementById('next').textContent=t('next');
  document.getElementById('hint').textContent=t('hint');
  render();
  if(aggD) renderAggregate(aggD);
}

const DATA = JSON.parse(document.getElementById('report-data').textContent);
const api = window.__vscodeApi || null;
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n||0);
const fmtDur = ms => ms==null?'—':ms>=60000?(ms/60000).toFixed(1)+'m':ms>=1000?(ms/1000).toFixed(1)+'s':Math.round(ms)+'ms';
const fmtPct = r => !r?'0%':(r*100).toFixed(r<0.1?1:0)+'%';
// fecha/hora en HORA LOCAL del PC (los timestamps llegan en ISO/UTC).
const pad2 = n => String(n).padStart(2,'0');
const ldtm = iso => { if(!iso) return ''; const d=new Date(iso); return isNaN(d)?'':d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes()); };
let all = (DATA.sessions||[]);
let page=0, size=50, filter='';

function filtered(){
  if(!filter) return all;
  const q=filter.toLowerCase();
  return all.filter(s=>((s.title||'')+' '+(s.sessionId||'')+' '+(s.source||'')).toLowerCase().includes(q));
}
function headerStats(){
  const rows=filtered();
  const tok=rows.reduce((a,s)=>a+(s.tokens||0),0);
  document.getElementById('sub').textContent=t('subCount', all.length, filter?t('subInFilter', rows.length):'');
  const st=(b,l)=>`<div class="stat"><b>${b}</b><span>${l}</span></div>`;
  document.getElementById('stats').innerHTML=st(rows.length, t('sessions')+(filter?' '+t('filter'):''))+st(fmt(tok), t('tokensRaw'));
}
function render(){
  headerStats();
  const rows=filtered();
  const pages=Math.max(1,Math.ceil(rows.length/size));
  if(page>=pages) page=pages-1; if(page<0) page=0;
  const start=page*size, slice=rows.slice(start,start+size);
  const tb=document.getElementById('rows');
  tb.innerHTML = slice.length ? slice.map(s=>`
    <tr class="row" data-id="${esc(s.sessionId)}">
      <td><span class="ttl">${esc(s.title||s.sessionId)}</span></td>
      <td><span class="pill">${esc(s.source||'')}</span></td>
      <td>${esc(ldtm(s.endedAt))}</td>
      <td class="num">${fmt(s.tokens)}</td>
    </tr>`).join('') : `<tr><td colspan="4" class="empty">${t('noSessions')}</td></tr>`;
  tb.querySelectorAll('tr.row').forEach(tr=>tr.onclick=()=>{
    const s=all.find(x=>x.sessionId===tr.dataset.id);
    if(api&&s) api.postMessage({type:'open', id:s.sessionId, file:s.file, source:s.source});
  });
  document.getElementById('pginfo').textContent = rows.length ? t('pginfo', start+1, Math.min(start+size,rows.length), rows.length) : t('pginfoEmpty');
  document.getElementById('prev').disabled = page<=0;
  document.getElementById('next').disabled = page>=pages-1;
}
function barTable(rows, cols, opts={}){
  const max=Math.max(1,...rows.map(r=>r._bar||0));
  let h='<table><tbody>';
  for(const r of rows){
    h+='<tr '+(opts.rowAttr?opts.rowAttr(r):'')+'>'+cols.map(c=>{
      if(c.bar) return `<td style="width:34%"><div class="barwrap"><div class="bar-fill" style="width:${Math.round(100*(r._bar||0)/max)}%"></div></div></td>`;
      const v=c.fn?c.fn(r):r[c.k];
      return `<td class="${c.num?'num':''}">${v}</td>`;
    }).join('')+'</tr>';
  }
  return h+'</tbody></table>';
}
let aggD=null, cur=null, winDays=7; // cur={kind,name}|null · ventana: 1 | 7 | 30 días
function byDay(pts){
  const m=new Map();
  for(const p of pts){
    const d=(p.startedAt||'').slice(0,10)||'?';
    const e=m.get(d)||{title:d,startedAt:d,tokens:0,durationMs:0,errors:0,retries:0,calls:0,toolUses:0,count:0};
    e.tokens+=p.tokens||0; e.durationMs+=p.durationMs||0; e.errors+=p.errors||0; e.retries+=p.retries||0; e.calls+=p.calls||0; e.toolUses+=p.toolUses||0; e.count+=p.count||0;
    m.set(d,e);
  }
  return [...m.values()].map(e=>({...e,errorRate:e.toolUses?e.errors/e.toolUses:0})).sort((a,b)=>a.startedAt.localeCompare(b.startedAt));
}
// desplaza un día YYYY-MM-DD en deltaDays (UTC, sin tocar zona horaria)
function dayShift(dayStr,deltaDays){ const d=new Date(dayStr+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+deltaDays); return d.toISOString().slice(0,10); }
// recorta los días agregados a la ventana (anclada al último día con datos)
function inWindow(dailyPts,days){
  if(!dailyPts.length) return dailyPts;
  const ref=dailyPts[dailyPts.length-1].startedAt.slice(0,10); // byDay viene asc
  const cutoff=dayShift(ref,-(days-1));
  return dailyPts.filter(p=>p.startedAt.slice(0,10)>=cutoff);
}
// ticks "nice": [0..top] en ~`target` pasos redondos (20k, 50, 0.2, …)
function niceTicks(max, target, intStep){
  if(!(max>0)) return [0,1];
  const raw=max/(target||5), mag=Math.pow(10,Math.floor(Math.log10(raw))), nrm=raw/mag;
  let step=(nrm<1.5?1:nrm<3?2:nrm<7?5:10)*mag;
  if(intStep) step=Math.max(1,Math.round(step)); // datos enteros (conteos): nada de pasos 0.5
  const top=Math.ceil(max/step)*step, out=[];
  for(let i=0; i*step<=top+step*1e-6; i++) out.push(+(i*step).toFixed(10)); // i*step + toFixed: sin drift float
  return out;
}
// índices equiespaciados sobre n puntos (incluye extremos), hasta `maxT` rótulos
function tickIdx(n, maxT){
  if(n<=1) return [0]; maxT=maxT||8;
  const want=n<=maxT?n:maxT, out=[];
  for(let i=0;i<want;i++) out.push(Math.round(i*(n-1)/(want-1)));
  return [...new Set(out)];
}
// línea con ejes: Y en pasos "nice" (grilla punteada) y X rotulado por fecha (5–10 ticks)
function spark(pts,getY,fmtY){
  const w=360,h=104,padL=44,padR=12,padT=8,padB=22, n=pts.length, ys=pts.map(getY), FS=7;
  const mx=Math.max(1,...ys), intY=ys.every(Number.isInteger);
  const yt=niceTicks(mx,5,intY), top=yt[yt.length-1]||1;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const X=i=> n===1? padL+plotW/2 : padL+i*plotW/(n-1);
  const Y=v=> (padT+plotH)-(v/top)*plotH;
  const pl=pts.map((p,i)=>X(i).toFixed(1)+','+Y(getY(p)).toFixed(1)).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(getY(p)).toFixed(1)}" r="2.5" fill="var(--acc)"><title>${esc((p.title||p.sessionId||'')+': '+fmtY(getY(p)))}</title></circle>`).join('');
  const ax='var(--line)', lb='var(--mut)';
  const grid=yt.map(v=>`<line x1="${padL}" y1="${Y(v).toFixed(1)}" x2="${w-padR}" y2="${Y(v).toFixed(1)}" stroke="${ax}" stroke-dasharray="2 3" opacity=".5"/><text x="${padL-5}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" fill="${lb}" font-size="${FS}">${esc(fmtY(v))}</text>`).join('');
  const yAxis=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="${ax}"/>`;
  const xAxis=`<line x1="${padL}" y1="${padT+plotH}" x2="${w-padR}" y2="${padT+plotH}" stroke="${ax}"/>`;
  const xl=p=>String(p&&p.startedAt||'').slice(5,10);
  const xT=tickIdx(n,8).map(i=>{ const x=X(i), anc=i===0?'start':i===n-1?'end':'middle';
    return `<line x1="${x.toFixed(1)}" y1="${(padT+plotH).toFixed(1)}" x2="${x.toFixed(1)}" y2="${(padT+plotH+3).toFixed(1)}" stroke="${ax}"/><text x="${x.toFixed(1)}" y="${h-7}" text-anchor="${anc}" fill="${lb}" font-size="${FS}">${esc(xl(pts[i]))}</text>`; }).join('');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}">${grid}${yAxis}${xAxis}<polyline fill="none" stroke="var(--acc)" stroke-width="1.5" points="${pl}"/>${dots}${xT}</svg>`;
}
// marca la fila seleccionada (agente/skill) para entender qué alimenta el gráfico
function markSelected(){
  document.querySelectorAll('#byAgent tr.selrow,#bySkill tr.selrow').forEach(tr=>tr.classList.remove('selrow'));
  if(!cur) return;
  // compara por dataset (no se construye un selector CSS): tolera nombres con
  // comillas, corchetes, & < > … y el match usa el mismo valor crudo del data-*.
  const box=cur.kind==='skill'?'#bySkill':'#byAgent', attr=cur.kind==='skill'?'skill':'agent';
  document.querySelectorAll(box+' tr[data-'+attr+']').forEach(tr=>{ if(tr.dataset[attr]===cur.name) tr.classList.add('selrow'); });
}
// drill-down in-page de agente o skill, reutilizando el mismo panel #agentDetail.
// opts.scroll = true mueve la vista hacia el gráfico (al elegir desde la tabla).
function showEntity(kind,name,opts={}){
  cur={kind,name};
  const tl=kind==='skill'?(aggD&&aggD.skillTimeline):(aggD&&aggD.agentTimeline);
  const raw=(tl&&tl[name])||[];
  const pts=inWindow(byDay(raw), winDays); // siempre agregado por día, recortado a la ventana
  document.getElementById('adTitle').textContent=t(kind==='skill'?'skillDot':'agentDot', name);
  document.getElementById('adSub').textContent=t('appearDays', raw.length, pts.length);
  const charts=kind==='skill'
    ? [ {t:t('chUses'),g:p=>p.count||0,f:fmt} ]
    : [
        {t:t('chTokens'),g:p=>p.tokens||0,f:fmt},
        {t:t('chError'),g:p=>p.errorRate||0,f:fmtPct},
        {t:t('chDurationDay'),g:p=>p.durationMs||0,f:fmtDur},
        {t:t('chRetries'),g:p=>p.retries||0,f:v=>String(Math.round(v))},
      ];
  document.getElementById('adCharts').innerHTML = pts.length
    ? charts.map(c=>`<div class="chart"><div class="charth">${c.t}</div>${spark(pts,c.g,c.f)}</div>`).join('')
    : `<div class="note">${t(kind==='skill'?'noSkillData':'noAgentData')}</div>`;
  document.getElementById('agentDetail').style.display='';
  markSelected();
  if(opts.scroll) document.getElementById('agentDetail').scrollIntoView({behavior:'smooth',block:'start'});
}
function setSeg(){ [[7,'ad7'],[30,'ad30']].forEach(([d,id])=>document.getElementById(id).classList.toggle('on',winDays===d)); }
function setWin(d){ winDays=d; setSeg(); if(cur) showEntity(cur.kind,cur.name); }
document.getElementById('ad7').onclick=()=>setWin(7);
document.getElementById('ad30').onclick=()=>setWin(30);
document.getElementById('adOpen').onclick=()=>{ if(api&&cur) api.postMessage({type:'openEntity', kind:cur.kind, name:cur.name}); };

function renderAggregate(d){
  aggD=d;
  document.getElementById('agg').classList.add('on');
  document.getElementById('agg-title').textContent=t('aggSummary', d.totals.sessions, fmt(d.totals.tokens), d.totals.findings);
  document.getElementById('byAgent').innerHTML=barTable(
    (d.byAgent||[]).map(a=>({...a,_bar:a.tokens})),
    [{h:t('colAgent'),fn:a=>esc(a.name||'?')},{h:t('colCalls'),k:'calls',num:1},{h:t('colTokens'),fn:a=>fmt(a.tokens),num:1},{h:'',bar:1}],
    { rowAttr:a=>'data-agent="'+esc(a.name||'')+'" class="clickable"' });
  document.querySelectorAll('#byAgent tr.clickable').forEach(tr=>tr.onclick=()=>showEntity('agent',tr.dataset.agent,{scroll:true}));
  document.getElementById('bySkill').innerHTML=barTable(
    (d.bySkill||[]).map(s=>({...s,_bar:s.count})),
    [{h:t('colSkill'),fn:s=>esc(s.name)},{h:t('colUses'),k:'count',num:1},{h:'',bar:1}],
    { rowAttr:s=>'data-skill="'+esc(s.name||'')+'" class="clickable"' });
  document.querySelectorAll('#bySkill tr.clickable').forEach(tr=>tr.onclick=()=>showEntity('skill',tr.dataset.skill,{scroll:true}));
  // mantiene la selección abierta si sigue existiendo; si no, preselecciona el primer
  // agente (el de más tokens) para que el gráfico aparezca ya poblado al cargar.
  let keep=null;
  if(cur){
    const tl=cur.kind==='skill'?d.skillTimeline:d.agentTimeline;
    if(tl && tl[cur.name]) keep=cur;
  }
  if(keep) showEntity(keep.kind,keep.name);
  else if((d.byAgent||[]).length) showEntity('agent', d.byAgent[0].name);
  else if((d.bySkill||[]).length) showEntity('skill', d.bySkill[0].name);
  else { cur=null; document.getElementById('agentDetail').style.display='none'; }
  const b=document.getElementById('analyze'); b.disabled=false; b.textContent=t('reanalyze'); b.classList.remove('stale');
}

document.getElementById('pagesize').onchange=e=>{size=+e.target.value;page=0;render();};
document.getElementById('q').oninput=e=>{filter=e.target.value;page=0;render();};
document.getElementById('prev').onclick=()=>{page--;render();};
document.getElementById('next').onclick=()=>{page++;render();};
function runAnalyze(){
  if(!api) return;
  const ids=filtered().map(s=>s.sessionId);
  const b=document.getElementById('analyze'); b.disabled=true; b.textContent=t('analyzing', ids.length);
  api.postMessage({type:'aggregate', ids});
}
document.getElementById('analyze').onclick=runAnalyze;
// tabla EN VIVO: la extensión empuja filas frescas al cambiar las sesiones.
// Preserva página/filtro; solo cambia el conjunto de datos.
function applySessions(list){
  all = list||[]; render();
  // si ya hay agregados calculados, avisa que llegaron sesiones nuevas: los
  // charts/dashboard reflejan el análisis previo hasta re-analizar.
  if(aggD){ const b=document.getElementById('analyze'); b.textContent=t('reanalyzeStale'); b.classList.add('stale'); }
}
window.addEventListener('message', e=>{ const m=e.data; if(!m) return;
  if(m.type==='aggregateResult') renderAggregate(m.data);
  else if(m.type==='sessions') applySessions(m.sessions);
});

document.documentElement.lang=lang;
renderLangToggle();
applyI18n();
// auto-análisis al abrir: agrega ya todas las sesiones del filtro con los
// parámetros por defecto, sin esperar a que el usuario pulse "Analizar".
if(api && all.length) runAnalyze();
</script>
</body>
</html>
