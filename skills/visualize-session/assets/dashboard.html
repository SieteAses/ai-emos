<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ai-emos — dashboard cross-sesión</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a; --tx:#e6e8ee; --mut:#9aa3b2; --acc:#6ea8fe; --bar:#3a64c0; }
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  header{padding:18px 22px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:16px;}
  .hmain{flex:1;min-width:0;}
  h1{font-size:17px;margin:0;} .sub{color:var(--mut);font-size:13px;margin-top:3px;}
  .stats{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;}
  .stat b{font-size:16px;} .stat span{color:var(--mut);font-size:12px;display:block;}
  .langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none;}
  .langtoggle button{border:0;border-radius:0;padding:5px 9px;background:var(--panel2);color:var(--mut);font-size:11px;cursor:pointer;}
  .langtoggle button.on{background:var(--acc);color:#0b0d11;font-weight:600;}
  main{padding:16px 22px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  section{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  section.full{grid-column:1/-1;}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:0 0 10px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);}
  th{color:var(--mut);font-weight:600;cursor:pointer;user-select:none;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .bar{height:8px;background:var(--bar);border-radius:4px;}
  .barwrap{background:var(--panel2);border-radius:4px;overflow:hidden;}
  a{color:var(--acc);text-decoration:none;} a:hover{text-decoration:underline;}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:11px;color:var(--mut);}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:5px 10px;cursor:pointer;font:inherit;}
  button:hover{border-color:var(--acc);}
  /* drill-down: agente en el tiempo */
  tr.clickable{cursor:pointer;} tr.clickable:hover td{background:var(--panel2);}
  .adbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .adbar .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .adbar .seg button{border:0;border-radius:0;padding:5px 12px;}
  .adbar .seg button.on{background:var(--acc);color:#0b0d11;font-weight:600;}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .chart{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
  .charth{font-size:12px;color:var(--mut);margin-bottom:6px;}
  .spark{display:block;width:100%;height:auto;}
  .sparkmeta{display:flex;justify-content:space-between;color:var(--mut);font-size:11px;margin-top:4px;}
  .note{color:var(--mut);font-size:12px;}
</style>
</head>
<body>
<header>
  <div class="hmain">
    <h1 id="h1">Dashboard cross-sesión</h1>
    <div class="sub" id="sub"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="langtoggle" id="langtoggle"></div>
</header>
<main>
  <section><h2 id="h2ByAgent"></h2><div id="byAgent"></div></section>
  <section><h2 id="h2BySkill"></h2><div id="bySkill"></div></section>
  <section class="full" id="agentDetail" style="display:none">
    <div class="adbar">
      <h2 id="adTitle" style="margin:0">Agente</h2>
      <span class="sub" id="adSub"></span>
      <div class="seg" style="margin-left:auto">
        <button id="adSes" class="on">por sesión</button><button id="adDay">por día</button>
      </div>
      <button id="adClose" title="cerrar">✕</button>
    </div>
    <div class="charts" id="adCharts"></div>
  </section>
  <section class="full"><h2 id="h2Sessions">Sesiones</h2><div id="sessions"></div></section>
</main>

<script id="report-data" type="application/json">
{"generatedFrom":0,"totals":{"tokens":0,"decisions":0,"findings":0,"sessions":0},"byAgent":[],"bySkill":[],"sessions":[]}
</script>
<script>
// ---- i18n (ES por defecto; auto-detecta y permite toggle ES|EN) ----
const I18N = {
  es: {
    docTitle:'ai-emos — dashboard cross-sesión', h1:'Dashboard cross-sesión',
    subAgg:'{0} sesiones agregadas', stTokensTotal:'tokens totales', stSessions:'sesiones',
    stHumanDecisions:'decisiones humanas', stToReview:'tramos a revisar',
    byAgent:'Por agente (tokens)', byAgentHint:'clic en un agente → su comportamiento en el tiempo',
    bySkill:'Por skill (usos)', sessions:'Sesiones',
    agent:'Agente', agentDot:'Agente · {0}', appearances:'{0} apariciones · {1} {2}',
    bySession:'por sesión', byDay:'por día', close:'cerrar',
    chTokens:'tokens', chError:'% error', chDuration:'duración', chDurationDay:'duración (total/día)', chRetries:'reintentos',
    days:'días', daysUnit:'sesiones', min:'mín', last:'últ', max:'máx', noAgentData:'sin datos para este agente',
    colAgent:'agente', colCalls:'llamadas', colTokens:'tokens', colAvgTok:'prom. tok', colAvgDur:'prom. dur',
    colErr:'% error', colCommonTools:'herramientas comunes', colSkill:'skill', colUses:'usos',
    colSession:'sesión', colStart:'inicio', colSteps:'pasos', colAgents:'agentes', colDecisions:'decisiones', colReview:'a revisar',
  },
  en: {
    docTitle:'ai-emos — cross-session dashboard', h1:'Cross-session dashboard',
    subAgg:'{0} aggregated sessions', stTokensTotal:'total tokens', stSessions:'sessions',
    stHumanDecisions:'human decisions', stToReview:'segments to review',
    byAgent:'By agent (tokens)', byAgentHint:'click an agent → its behavior over time',
    bySkill:'By skill (uses)', sessions:'Sessions',
    agent:'Agent', agentDot:'Agent · {0}', appearances:'{0} appearances · {1} {2}',
    bySession:'by session', byDay:'by day', close:'close',
    chTokens:'tokens', chError:'% error', chDuration:'duration', chDurationDay:'duration (total/day)', chRetries:'retries',
    days:'days', daysUnit:'sessions', min:'min', last:'last', max:'max', noAgentData:'no data for this agent',
    colAgent:'agent', colCalls:'calls', colTokens:'tokens', colAvgTok:'avg tok', colAvgDur:'avg dur',
    colErr:'% error', colCommonTools:'common tools', colSkill:'skill', colUses:'uses',
    colSession:'session', colStart:'start', colSteps:'steps', colAgents:'agents', colDecisions:'decisions', colReview:'to review',
  },
};
function resolveLang(){
  try{ const s=localStorage.getItem('aiEmosLang'); if(s==='es'||s==='en') return s; }catch(e){}
  if(window.__lang==='es'||window.__lang==='en') return window.__lang;
  return String(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
}
let lang = resolveLang();
const t = (k,...a)=>{ let s=(I18N[lang]&&I18N[lang][k])||I18N.es[k]||k; a.forEach((v,i)=>{s=s.split('{'+i+'}').join(v);}); return s; };
function renderLangToggle(){
  const el=document.getElementById('langtoggle'); if(!el) return;
  el.innerHTML=['es','en'].map(l=>`<button data-l="${l}" class="${l===lang?'on':''}">${l.toUpperCase()}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>setLang(b.dataset.l));
}
function setLang(l){ if(l!==lang){ lang=l; try{localStorage.setItem('aiEmosLang',l);}catch(e){} } document.documentElement.lang=l; applyI18n(); renderLangToggle(); }
function applyI18n(){
  document.title=t('docTitle');
  document.getElementById('h1').textContent=t('h1');
  document.getElementById('h2ByAgent').innerHTML=`${t('byAgent')} · <span style="text-transform:none;font-weight:400">${t('byAgentHint')}</span>`;
  document.getElementById('h2BySkill').textContent=t('bySkill');
  document.getElementById('h2Sessions').textContent=t('sessions');
  document.getElementById('adSes').textContent=t('bySession');
  document.getElementById('adDay').textContent=t('byDay');
  document.getElementById('adClose').title=t('close');
  if(DATA) applyData(DATA);
}

const fmt = n => n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n||0);
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmtDur = ms => ms==null?'—':ms>=60000?(ms/60000).toFixed(1)+'m':ms>=1000?(ms/1000).toFixed(1)+'s':Math.round(ms)+'ms';
const fmtPct = r => !r?'0%':(r*100).toFixed(r<0.1?1:0)+'%';
const toolPills = tools => (tools||[]).slice(0,5).map(t=>`<span class="pill">${esc(t.name)} ${t.count}</span>`).join(' ') || '<span class="pill">—</span>';
// fecha/hora en HORA LOCAL del PC (los timestamps llegan en ISO/UTC).
const pad2 = n => String(n).padStart(2,'0');
const ldtm = iso => { if(!iso) return ''; const d=new Date(iso); return isNaN(d)?'':d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes()); };

const stat=(b,l)=>`<div class="stat"><b>${b}</b><span>${l}</span></div>`;

function barTable(rows, cols, opts={}){
  const max = Math.max(1, ...rows.map(r=>r._bar||0));
  let h='<table><thead><tr>'+cols.map(c=>`<th>${c.h}</th>`).join('')+'</tr></thead><tbody>';
  for(const r of rows){
    h+='<tr '+(opts.rowAttr?opts.rowAttr(r):'')+'>'+cols.map(c=>{
      if(c.bar) return `<td><div class="barwrap"><div class="bar" style="width:${Math.round(100*(r._bar||0)/max)}%"></div></div></td>`;
      const v=c.fn?c.fn(r):r[c.k];
      return `<td class="${c.num?'num':''}">${v}</td>`;
    }).join('')+'</tr>';
  }
  return h+'</tbody></table>';
}

// ---- drill-down: agente en el tiempo ----
let DATA=null, curAgent=null, agMode='session';
// agrega los puntos por día (suma de la jornada); recalcula errorRate del día
function byDay(pts){
  const m=new Map();
  for(const p of pts){
    const d=(p.startedAt||'').slice(0,10)||'?';
    const e=m.get(d)||{title:d,startedAt:d,tokens:0,durationMs:0,errors:0,retries:0,calls:0,toolUses:0};
    e.tokens+=p.tokens||0; e.durationMs+=p.durationMs||0; e.errors+=p.errors||0; e.retries+=p.retries||0; e.calls+=p.calls||0; e.toolUses+=p.toolUses||0;
    m.set(d,e);
  }
  return [...m.values()].map(e=>({...e,errorRate:e.toolUses?e.errors/e.toolUses:0})).sort((a,b)=>a.startedAt.localeCompare(b.startedAt));
}
// sparkline SVG sin dependencias (línea + puntos con tooltip)
function spark(pts,getY,fmtY){
  const w=300,h=60,pad=8, n=pts.length, ys=pts.map(getY);
  const mn=Math.min(0,...ys), mx=Math.max(1,...ys), span=(mx-mn)||1;
  const X=i=> n===1? w/2 : pad+i*(w-2*pad)/(n-1);
  const Y=v=> h-pad-((v-mn)/span)*(h-2*pad);
  const pl=pts.map((p,i)=>X(i).toFixed(1)+','+Y(getY(p)).toFixed(1)).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(getY(p)).toFixed(1)}" r="2.5" fill="var(--acc)"><title>${esc((p.title||p.sessionId||'')+': '+fmtY(getY(p)))}</title></circle>`).join('');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="var(--acc)" stroke-width="1.5" points="${pl}"/>${dots}</svg>`
    +`<div class="sparkmeta"><span>${t('min')} ${fmtY(mn)}</span><span>${t('last')} ${fmtY(getY(pts[n-1]))}</span><span>${t('max')} ${fmtY(mx)}</span></div>`;
}
function showAgent(name){
  curAgent=name;
  const raw=(DATA&&DATA.agentTimeline&&DATA.agentTimeline[name])||[];
  const pts=agMode==='day'?byDay(raw):raw;
  document.getElementById('adTitle').textContent=t('agentDot', name);
  document.getElementById('adSub').textContent=t('appearances', raw.length, pts.length, agMode==='day'?t('days'):t('daysUnit'));
  const charts=[
    {t:t('chTokens'),g:p=>p.tokens||0,f:fmt},
    {t:t('chError'),g:p=>p.errorRate||0,f:fmtPct},
    {t:agMode==='day'?t('chDurationDay'):t('chDuration'),g:p=>p.durationMs||0,f:fmtDur},
    {t:t('chRetries'),g:p=>p.retries||0,f:v=>String(Math.round(v))},
  ];
  document.getElementById('adCharts').innerHTML = pts.length
    ? charts.map(c=>`<div class="chart"><div class="charth">${c.t}</div>${spark(pts,c.g,c.f)}</div>`).join('')
    : `<div class="note">${t('noAgentData')}</div>`;
  const sec=document.getElementById('agentDetail'); sec.style.display=''; sec.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function setSeg(){ document.getElementById('adSes').classList.toggle('on',agMode==='session'); document.getElementById('adDay').classList.toggle('on',agMode==='day'); }
document.getElementById('adSes').onclick=()=>{ agMode='session'; setSeg(); if(curAgent) showAgent(curAgent); };
document.getElementById('adDay').onclick=()=>{ agMode='day'; setSeg(); if(curAgent) showAgent(curAgent); };
document.getElementById('adClose').onclick=()=>{ curAgent=null; document.getElementById('agentDetail').style.display='none'; };

function applyData(D){
  DATA=D;
document.getElementById('sub').textContent = t('subAgg', D.totals.sessions);
document.getElementById('stats').innerHTML =
  stat(fmt(D.totals.tokens),t('stTokensTotal')) + stat(D.totals.sessions,t('stSessions')) +
  stat(D.totals.decisions,t('stHumanDecisions')) + stat(D.totals.findings,t('stToReview'));

document.getElementById('byAgent').innerHTML = barTable(
  D.byAgent.map(a=>({...a,_bar:a.tokens})),
  [
    {h:t('colAgent'),fn:a=>esc(a.name)},
    {h:t('colCalls'),k:'calls',num:1},
    {h:t('colTokens'),fn:a=>fmt(a.tokens),num:1},
    {h:t('colAvgTok'),fn:a=>fmt(a.tokensAvg),num:1},
    {h:t('colAvgDur'),fn:a=>fmtDur(a.durationAvg),num:1},
    {h:t('colErr'),fn:a=>fmtPct(a.errorRate),num:1},
    {h:t('colCommonTools'),fn:a=>toolPills(a.tools)},
    {h:'',bar:1},
  ],
  { rowAttr:a=>'data-agent="'+esc(String(a.name||'').replace(/"/g,''))+'" class="clickable"' });
document.querySelectorAll('#byAgent tr.clickable').forEach(tr=>tr.onclick=()=>showAgent(tr.dataset.agent));
// si hay un detalle abierto, refréscalo con los datos nuevos (modo en vivo)
if(curAgent){ if(D.agentTimeline && D.agentTimeline[curAgent]) showAgent(curAgent); else { curAgent=null; document.getElementById('agentDetail').style.display='none'; } }

document.getElementById('bySkill').innerHTML = barTable(
  D.bySkill.map(s=>({...s,_bar:s.count})),
  [{h:t('colSkill'),fn:s=>esc(s.name)},{h:t('colUses'),k:'count',num:1},{h:'',bar:1}]);

document.getElementById('sessions').innerHTML = barTable(
  D.sessions.map(s=>({...s,_bar:s.tokens})),
  [
    {h:t('colSession'),fn:s=>`${esc(s.title||s.sessionId)} <span class="pill">${esc(s.source)}</span>`},
    {h:t('colStart'),fn:s=>ldtm(s.startedAt)},
    {h:t('colSteps'),k:'steps',num:1},
    {h:t('colAgents'),k:'agents',num:1},
    {h:t('colDecisions'),k:'decisions',num:1},
    {h:t('colReview'),k:'findings',num:1},
    {h:t('colTokens'),fn:s=>fmt(s.tokens),num:1},
    {h:'',bar:1},
  ]);
}

window.__aiEmosApply = applyData;
document.documentElement.lang=lang;
renderLangToggle();
applyData(JSON.parse(document.getElementById('report-data').textContent));
applyI18n();

// modo en vivo (SSE del servidor o postMessage de VS Code); inerte en standalone
(function(){
  window.addEventListener('message', e => { const m = e && e.data; if (m && m.type === 'data' && m.trace) applyData(m.trace); });
  if (window.__aiEmosLive) {
    try { const es = new EventSource(window.__aiEmosLive); es.onmessage = ev => { try { applyData(JSON.parse(ev.data)); } catch (e) {} }; } catch (e) {}
  }
})();
</script>
</body>
</html>
